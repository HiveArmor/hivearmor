<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Two Factor Authentication Verification Code</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>
<body>
    <div th:insert="mail/fragments/branding.html :: email-header"></div>

    <p th:text="${'Dear ' + user.login}"></p>
    <p>
        This is your verification code for the next authentication step.
        This code is valid only for 5 minutes.
    </p>
    <p style="font-size: 24px; font-weight: bold; letter-spacing: 4px; color: #4F8EF7;"
       th:text="${tfaCode}"></p>

    <div th:insert="mail/fragments/branding.html :: email-footer"></div>
</body>
</html>
