# =============================================================================
# CM Server — standalone development stack
# =============================================================================
# This compose file is for developing / testing the CM server in isolation.
# In production the CM server runs on HiveArmor-owned infra at cm.onlyhacker.org
# and cmdev.onlyhacker.org — it is NOT part of the customer stack.
#
# Usage:
#   cd cm-server
#   cp .env.example .env   # fill in values
#   docker compose up -d
#   go run ./cmd/seed -id ci-dev -role ci   # bootstrap an admin account
#
# Endpoints:
#   CM API:    http://localhost:8085/api/v1/health
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hivearmor_cm
    volumes:
      - cm_postgres_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cm-server:
    image: hivearmor/cm-server:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/hivearmor_cm
      - CM_ENCRYPT_SALT=${CM_ENCRYPT_SALT}
      - CM_SIGN_PUBLIC_KEY=${CM_SIGN_PUBLIC_KEY}
      - PORT=8080
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  cm_postgres_data:
