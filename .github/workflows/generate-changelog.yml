name: Generate AI Changelog

# Thin wrapper around .github/scripts/generate-changelog.sh, which calls
# ThreatWinds /chat/completions to turn the commit log between two tags
# into end-user release notes.

on:
  workflow_call:
    inputs:
      current_tag:
        description: 'Current release tag (e.g., v11.2.0)'
        required: true
        type: string
      previous_tag:
        description: 'Previous tag to compare against (optional, auto-detected if empty)'
        required: false
        type: string
        default: ''
      product_name:
        description: 'Product name'
        required: false
        type: string
        default: 'HiveArmor'
      product_description:
        description: 'Product description'
        required: false
        type: string
        default: 'Unified Threat Management and SIEM Platform'
      model:
        description: 'ThreatWinds model ID (e.g., gemini-3-flash-lite, gemini-3-pro, claude-sonnet-4-6)'
        required: false
        type: string
        default: 'gemini-3-flash-lite'
    secrets:
      THREATWINDS_API_KEY:
        required: true
      THREATWINDS_API_SECRET:
        required: true
    outputs:
      changelog:
        description: 'Generated changelog content (multiline)'
        value: ${{ jobs.generate.outputs.changelog }}
      previous_tag:
        description: 'The previous tag used for comparison'
        value: ${{ jobs.generate.outputs.previous_tag }}

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-24.04
    outputs:
      changelog: ${{ steps.run.outputs.changelog }}
      previous_tag: ${{ steps.run.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for git tag listing and `git log A..B`.
          fetch-depth: 0

      - name: Generate changelog
        id: run
        env:
          THREATWINDS_API_KEY: ${{ secrets.THREATWINDS_API_KEY }}
          THREATWINDS_API_SECRET: ${{ secrets.THREATWINDS_API_SECRET }}
          PRODUCT_NAME: ${{ inputs.product_name }}
          PRODUCT_DESCRIPTION: ${{ inputs.product_description }}
          MODEL: ${{ inputs.model }}
          OUTPUT_FILE: /tmp/changelog.md
        run: |
          bash .github/scripts/generate-changelog.sh \
            "${{ inputs.current_tag }}" \
            "${{ inputs.previous_tag }}"

          # Resolve the previous tag the script actually used so the caller
          # can output it (the script prints it to stdout; re-derive it the
          # same way to be safe).
          if [ -n "${{ inputs.previous_tag }}" ]; then
            prev='${{ inputs.previous_tag }}'
          else
            current='${{ inputs.current_tag }}'
            all_tags=$(git tag --sort=-v:refname)
            found=false
            prev=""
            for t in $all_tags; do
              if [ "$found" = true ]; then prev="$t"; break; fi
              if [ "$t" = "$current" ]; then found=true; fi
            done
            if [ -z "$prev" ]; then
              prev=$(git rev-list --max-parents=0 HEAD | head -1)
            fi
          fi
          echo "previous_tag=$prev" >> "$GITHUB_OUTPUT"

          # Multiline output for the changelog.
          {
            echo 'changelog<<EOF'
            cat /tmp/changelog.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Preview
        run: |
          echo "## Generated Changelog Preview"
          echo ""
          cat /tmp/changelog.md
