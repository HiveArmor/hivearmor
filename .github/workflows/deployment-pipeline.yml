name: "HiveArmor - Build & Deploy Pipeline"

on:
  push:
    branches:
      - 'release/**'
  release:
    types: [published]

permissions:
  contents: write      # upload release assets
  packages: write      # push to ghcr.io
  id-token: write      # OIDC — required by reusable-sign-agent (GCP KMS auth)

jobs:
  setup_deployment:
    name: Setup Deployment
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.set-env.outputs.tag }}
      environment: ${{ steps.set-env.outputs.environment }}
      cm_url: ${{ steps.set-env.outputs.cm_url }}
      version_major: ${{ steps.set-env.outputs.version_major }}
      event_processor_tag: ${{ steps.set-env.outputs.event_processor_tag }}
    steps:
      - name: Determine Build Environment
        id: set-env
        run: |
          # =====================================================================
          # DEV — push to release/**
          # Version = <branch-base>-dev.N, auto-incremented via CM.
          # =====================================================================
          if ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/') }}; then
            ENVIRONMENT="dev"
            CM_URL="https://cmdev.onlyhacker.org"
            echo "Environment: $ENVIRONMENT"
            echo "CM URL: $CM_URL"

            # Extract version from branch name (e.g. release/v11.2.1 → v11.2.1)
            BRANCH_VERSION=$(echo "${{ github.ref }}" | sed 's|refs/heads/release/||')
            echo "Branch version: $BRANCH_VERSION"

            RESPONSE=$(curl -s "${CM_URL}/api/v1/versions/latest")
            LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.version // empty')
            echo "Latest version from CM: $LATEST_VERSION"

            if [ -n "$LATEST_VERSION" ]; then
              LATEST_BASE=$(echo "$LATEST_VERSION" | sed 's/-dev\.[0-9]*$//')
              if [ "$BRANCH_VERSION" = "$LATEST_BASE" ]; then
                DEV_NUM=$(echo "$LATEST_VERSION" | grep -oP '(?<=-dev\.)\d+')
                NEW_DEV_NUM=$((DEV_NUM + 1))
                TAG="${BRANCH_VERSION}-dev.${NEW_DEV_NUM}"
                echo "Versions match, incrementing: $TAG"
              else
                TAG="${BRANCH_VERSION}-dev.1"
                echo "Versions don't match, starting fresh: $TAG"
              fi
            else
              TAG="${BRANCH_VERSION}-dev.1"
              echo "No previous version found, starting fresh: $TAG"
            fi

            VERSION_MAJOR=$(echo "$BRANCH_VERSION" | grep -oP '^v\d+')

            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
            echo "cm_url=$CM_URL" >> $GITHUB_OUTPUT
            echo "version_major=$VERSION_MAJOR" >> $GITHUB_OUTPUT
            echo "event_processor_tag=${{ vars.TW_EVENT_PROCESSOR_VERSION_DEV }}" >> $GITHUB_OUTPUT

          # =====================================================================
          # PRODUCTION — release.published (prerelease or not)
          #
          # The tag is taken directly from the release event — no CM queries.
          # Always runs a full build and deploys to our production instances.
          # =====================================================================
          elif ${{ github.event_name == 'release' }}; then
            CM_URL="https://cm.onlyhacker.org"
            TAG="${{ github.event.release.tag_name }}"
            echo "Event: release, tag=$TAG"
            echo "Environment: production (our instances)"
            echo "CM URL: $CM_URL"

            # Derive major version from tag (e.g. v7.0.1 → v7, v11.2.0 → v11)
            VERSION_MAJOR=$(echo "$TAG" | grep -oP '^v\d+')

            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "cm_url=$CM_URL" >> $GITHUB_OUTPUT
            echo "version_major=$VERSION_MAJOR" >> $GITHUB_OUTPUT
            echo "event_processor_tag=${{ vars.TW_EVENT_PROCESSOR_VERSION_PROD }}" >> $GITHUB_OUTPUT
          fi

  build_agent:
    name: Build Agent Binaries
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Build Linux Binaries (amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_linux_amd64 -v -ldflags "-X 'github.com/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/agent/updater
          go build -o hivearmor_updater_service_linux_amd64 .

      - name: Build Linux Binaries (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_linux_arm64 -v -ldflags "-X 'github.com/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/agent/updater
          go build -o hivearmor_updater_service_linux_arm64 .

      - name: Build Windows Binaries (amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_windows_amd64.exe -v -ldflags "-X 'github.com/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/agent/updater
          go build -o hivearmor_updater_service_windows_amd64.exe .

      - name: Build Windows Binaries (arm64)
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_windows_arm64.exe -v -ldflags "-X 'github.com/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/agent/updater
          go build -o hivearmor_updater_service_windows_arm64.exe .

      - name: Build macOS Binaries (arm64)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_darwin_arm64 -v -ldflags "-X 'github.com/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/agent/updater
          go build -o hivearmor_updater_service_darwin_arm64 .

      - name: Upload Linux binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-linux
          path: |
            agent/hivearmor_agent_service_linux_amd64
            agent/hivearmor_agent_service_linux_arm64
            agent/updater/hivearmor_updater_service_linux_amd64
            agent/updater/hivearmor_updater_service_linux_arm64
          retention-days: 1

      - name: Upload unsigned Windows binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-windows-unsigned
          path: |
            agent/hivearmor_agent_service_windows_amd64.exe
            agent/hivearmor_agent_service_windows_arm64.exe
            agent/updater/hivearmor_updater_service_windows_amd64.exe
            agent/updater/hivearmor_updater_service_windows_arm64.exe
          retention-days: 1

      - name: Upload unsigned macOS binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-darwin-unsigned
          path: |
            agent/hivearmor_agent_service_darwin_arm64
            agent/updater/hivearmor_updater_service_darwin_arm64
          retention-days: 1

  sign_agent_windows:
    name: Sign Windows Agent Binaries
    needs: [build_agent, setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-sign-agent.yml
    with:
      os: windows
      artifact_name: agents-windows-unsigned
      signed_artifact_name: agents-windows-signed
      binaries: |
        hivearmor_agent_service_windows_amd64.exe
        hivearmor_agent_service_windows_arm64.exe
        updater/hivearmor_updater_service_windows_amd64.exe
        updater/hivearmor_updater_service_windows_arm64.exe
    secrets:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_PROD }}
      KMS_KEYRING_LOCATION: ${{ secrets.KMS_KEYRING_LOCATION }}
      KMS_KEYRING_NAME: ${{ secrets.KMS_KEYRING_NAME }}
      KMS_KEY_NAME: ${{ secrets.KMS_KEY_NAME }}
      GCP_WINDOWS_SIGNER_SA_KEY: ${{ secrets.GCP_WINDOWS_SIGNER_SA_KEY }}
      WINDOWS_SIGNER_CERT_CHAIN_PEM: ${{ secrets.WINDOWS_SIGNER_CERT_CHAIN_PEM }}

  sign_agent_macos:
    name: Sign macOS Agent Binaries
    needs: [build_agent, setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-sign-agent.yml
    with:
      os: macos
      artifact_name: agents-darwin-unsigned
      signed_artifact_name: agents-darwin-signed
      binaries: |
        hivearmor_agent_service_darwin_arm64
        updater/hivearmor_updater_service_darwin_arm64
    secrets:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build_hivearmor_collector:
    name: Build HiveArmor Collector
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Build HiveArmor Collectors
        run: |
          echo "Building HiveArmor Collector (linux/amd64)..."
          cd ${{ github.workspace }}/hivearmor-collector
          GOOS=linux GOARCH=amd64 go build -o hivearmor_collector -v -ldflags "-X 'github.com/hivearmor/hivearmor-collector/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          echo "Building HiveArmor Collector (darwin/amd64 — bundled into agent-manager image)..."
          GOOS=darwin GOARCH=amd64 go build -o hivearmor_collector_mac -v -ldflags "-X 'github.com/hivearmor/hivearmor-collector/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          echo "Building HiveArmor AS400 Collector..."
          cd ${{ github.workspace }}/as400
          GOOS=linux GOARCH=amd64 go build -o hivearmor_as400_collector_service -v -ldflags "-X 'github.com/hivearmor/as400/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

          cd ${{ github.workspace }}/as400/updater
          GOOS=linux GOARCH=amd64 go build -o hivearmor_as400_updater_service -v .

      - name: Upload collector binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivearmor-collectors
          path: |
            ${{ github.workspace }}/hivearmor-collector/hivearmor_collector
            ${{ github.workspace }}/hivearmor-collector/hivearmor_collector_mac
            ${{ github.workspace }}/as400/hivearmor_as400_collector_service
            ${{ github.workspace }}/as400/updater/hivearmor_as400_updater_service
          retention-days: 1

  build_agent_manager:
    name: Build Agent Manager Microservice
    needs: [sign_agent_windows, sign_agent_macos, build_hivearmor_collector, setup_deployment]
    if: ${{ needs.sign_agent_windows.result == 'success' && needs.sign_agent_macos.result == 'success' && needs.build_hivearmor_collector.result == 'success' && needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Download Linux agents from artifact
        uses: actions/download-artifact@v4
        with:
          name: agents-linux
          path: ${{ github.workspace }}/agent

      - name: Download signed Windows agents from artifact
        uses: actions/download-artifact@v4
        with:
          name: agents-windows-signed
          path: ${{ github.workspace }}/agent

      - name: Download HiveArmor Collectors from artifacts
        uses: actions/download-artifact@v4
        with:
          name: hivearmor-collectors
          path: ${{ github.workspace }}/hivearmor-collector

      - name: Download signed macOS agents from artifact
        uses: actions/download-artifact@v4
        with:
          name: agents-darwin-signed
          path: ${{ github.workspace }}/agent-darwin

      - name: Prepare dependencies for Agent Manager Image
        run: |
          cd ${{ github.workspace }}/agent-manager
          GOOS=linux GOARCH=amd64  go build -o agent-manager -v .

          mkdir -p ./dependencies/collector
          cp "${{ github.workspace }}/hivearmor-collector/hivearmor-collector/hivearmor_collector" ./dependencies/collector/
          cp "${{ github.workspace }}/hivearmor-collector/version.json" ./dependencies/collector/

          mkdir -p ./dependencies/collector/as400
          # as400-collector.jar is a pre-built Java binary distributed via CDN.
          # Download it if available; skip gracefully if cdn.hivearmor.io is not yet live.
          if curl -sSfL --max-time 30 "https://cdn.hivearmor.io/updates/dependencies/collector/as400-collector.jar" \
              -o ./dependencies/collector/as400/as400-collector.jar 2>/dev/null; then
            echo "✅ Downloaded as400-collector.jar from CDN"
          else
            echo "⚠️  cdn.hivearmor.io not reachable — creating placeholder as400-collector.jar"
            echo "placeholder" > ./dependencies/collector/as400/as400-collector.jar
          fi

          cp "${{ github.workspace }}/as400/version.json" ./dependencies/collector/as400/
          cp "${{ github.workspace }}/hivearmor-collector/as400/hivearmor_as400_collector_service" ./dependencies/collector/as400/
          cp "${{ github.workspace }}/hivearmor-collector/as400/updater/hivearmor_as400_updater_service" ./dependencies/collector/as400/

          mkdir -p ./dependencies/agent/

          # Linux agents
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_linux_amd64" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_linux_arm64" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_linux_amd64" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_linux_arm64" ./dependencies/agent/

          # Windows agents
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_windows_amd64.exe" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_windows_arm64.exe" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_windows_amd64.exe" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_windows_arm64.exe" ./dependencies/agent/

          # macOS agents (signed and notarized)
          cp "${{ github.workspace }}/agent-darwin/hivearmor_agent_service_darwin_arm64" ./dependencies/agent/
          cp "${{ github.workspace }}/agent-darwin/updater/hivearmor_updater_service_darwin_arm64" ./dependencies/agent/
          # macOS collector built from source in build_hivearmor_collector job
          cp "${{ github.workspace }}/hivearmor-collector/hivearmor-collector/hivearmor_collector_mac" ./dependencies/agent/hivearmor-collector-mac

          # TODO: Remove legacy binary names after all agents have migrated to new naming convention
          # Legacy names for backwards compatibility with existing agents
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_linux_amd64" ./dependencies/agent/hivearmor_agent_service
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_linux_amd64" ./dependencies/agent/hivearmor_updater_service
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_windows_amd64.exe" ./dependencies/agent/hivearmor_agent_service.exe
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_windows_amd64.exe" ./dependencies/agent/hivearmor_updater_service.exe
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_windows_arm64.exe" ./dependencies/agent/hivearmor_agent_service_arm64.exe
          cp "${{ github.workspace }}/agent/updater/hivearmor_updater_service_windows_arm64.exe" ./dependencies/agent/hivearmor_updater_service_arm64.exe

          cp "${{ github.workspace }}/agent/version.json" ./dependencies/agent/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push the Agent Manager Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-manager/Dockerfile
          push: true
          provenance: false
          tags: ghcr.io/hivearmor/agent-manager:${{ needs.setup_deployment.outputs.tag }}

  build_event_processor:
    name: Build Event Processor Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Build Plugins
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          cd ${{ github.workspace }}/plugins/alerts; go build -o com.hivearmor.alerts.plugin -v .
          cd ${{ github.workspace }}/plugins/aws; go build -o com.hivearmor.aws.plugin -v .
          cd ${{ github.workspace }}/plugins/azure; go build -o com.hivearmor.azure.plugin -v .
          cd ${{ github.workspace }}/plugins/bitdefender; go build -o com.hivearmor.bitdefender.plugin -v .
          cd ${{ github.workspace }}/plugins/config; go build -o com.hivearmor.config.plugin -v .
          cd ${{ github.workspace }}/plugins/events; go build -o com.hivearmor.events.plugin -v .
          cd ${{ github.workspace }}/plugins/gcp; go build -o com.hivearmor.gcp.plugin -v .
          cd ${{ github.workspace }}/plugins/geolocation; go build -o com.hivearmor.geolocation.plugin -v .
          cd ${{ github.workspace }}/plugins/inputs; go build -o com.hivearmor.inputs.plugin -v .
          cd ${{ github.workspace }}/plugins/o365; go build -o com.hivearmor.o365.plugin -v .
          cd ${{ github.workspace }}/plugins/sophos; go build -o com.hivearmor.sophos.plugin -v .
          cd ${{ github.workspace }}/plugins/stats; go build -o com.hivearmor.stats.plugin -v .
          cd ${{ github.workspace }}/plugins/soc-ai; go build -o com.hivearmor.soc-ai.plugin -v .
          cd ${{ github.workspace }}/plugins/modules-config; go build -o com.hivearmor.modules-config.plugin -v .
          cd ${{ github.workspace }}/plugins/crowdstrike; go build -o com.hivearmor.crowdstrike.plugin -v .
          cd ${{ github.workspace }}/plugins/feeds; go build -o com.hivearmor.feeds.plugin -v .

      - name: Prepare Dependencies for Event Processor Image
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          mkdir -p ./geolocation
          if [ -n "$MAXMIND_LICENSE_KEY" ]; then
            echo "→ Downloading GeoLite2 CSVs from MaxMind..."
            MAXMIND_LICENSE_KEY="$MAXMIND_LICENSE_KEY" \
              bash event-processor/geolocation-bundle/download.sh
            cp event-processor/geolocation-bundle/asn-blocks-v4.csv ./geolocation/
            cp event-processor/geolocation-bundle/asn-blocks-v6.csv ./geolocation/
            cp event-processor/geolocation-bundle/blocks-v4.csv     ./geolocation/
            cp event-processor/geolocation-bundle/blocks-v6.csv     ./geolocation/
            cp event-processor/geolocation-bundle/locations-en.csv  ./geolocation/
          else
            echo "⚠️  MAXMIND_LICENSE_KEY not set — creating empty geolocation placeholder files"
            touch ./geolocation/asn-blocks-v4.csv \
                  ./geolocation/asn-blocks-v6.csv \
                  ./geolocation/blocks-v4.csv \
                  ./geolocation/blocks-v6.csv \
                  ./geolocation/locations-en.csv
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push the Event Processor Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./event_processor.Dockerfile
          push: true
          provenance: false
          tags: ghcr.io/hivearmor/eventprocessor:${{ needs.setup_deployment.outputs.tag }}
          build-args: |
            BASE_IMAGE=ghcr.io/threatwinds/eventprocessor/base:${{ needs.setup_deployment.outputs.event_processor_tag }}

  build_backend:
    name: Build Backend Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: backend
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '17'
      use_tag_as_version: true
      maven_profile: 'prod'
      maven_goals: 'clean package'
      copy_filters_and_rules: true

  build_user_auditor:
    name: Build User-Auditor Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: user-auditor
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '17'
      use_version_file: false
      maven_goals: 'clean install -U'

  build_web_pdf:
    name: Build Web-PDF Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: web-pdf
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '17'
      use_version_file: false
      maven_goals: 'clean install -U'

  build_frontend:
    name: Build Frontend (Next.js)
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-v2
          push: true
          provenance: false
          tags: ghcr.io/hivearmor/frontend:${{ needs.setup_deployment.outputs.tag }}

  all_builds_complete:
    name: All Builds Complete
    needs: [
      build_agent_manager,
      build_event_processor,
      build_backend,
      build_user_auditor,
      build_web_pdf,
      build_frontend
    ]
    if: ${{ always() && needs.build_agent_manager.result == 'success' && needs.build_event_processor.result == 'success' && needs.build_backend.result == 'success' && needs.build_user_auditor.result == 'success' && needs.build_web_pdf.result == 'success' && needs.build_frontend.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo "✅ All builds completed successfully."

  # Installer build runs on any GitHub release event (prerelease or not).
  # The binary is uploaded to the release that triggered this pipeline.
  build_installer_release:
    name: Build & Upload Installer
    needs: [all_builds_complete, setup_deployment]
    if: ${{ always() && needs.all_builds_complete.result == 'success' && needs.setup_deployment.outputs.tag != '' && github.event_name == 'release' }}
    uses: ./.github/workflows/installer-release.yml
    with:
      version: ${{ needs.setup_deployment.outputs.tag }}
      version_major: ${{ needs.setup_deployment.outputs.version_major }}
      environment: ${{ needs.setup_deployment.outputs.environment }}
    secrets:
      API_SECRET: ${{ secrets.API_SECRET }}
      CM_ENCRYPT_SALT: ${{ secrets.CM_ENCRYPT_SALT }}
      CM_SIGN_PUBLIC_KEY: ${{ secrets.CM_SIGN_PUBLIC_KEY }}

  deploy_installer_dev:
    name: Deploy Installer (Dev)
    needs: [all_builds_complete, setup_deployment]
    if: ${{ always() && needs.all_builds_complete.result == 'success' && needs.setup_deployment.outputs.tag != '' && needs.setup_deployment.outputs.environment == 'dev' }}
    uses: ./.github/workflows/installer-release.yml
    with:
      version: ${{ needs.setup_deployment.outputs.tag }}
      version_major: ${{ needs.setup_deployment.outputs.version_major }}
      environment: dev
    secrets:
      API_SECRET: ${{ secrets.API_SECRET }}
      CM_ENCRYPT_SALT: ${{ secrets.CM_ENCRYPT_SALT }}
      CM_SIGN_PUBLIC_KEY: ${{ secrets.CM_SIGN_PUBLIC_KEY }}

  publish_new_version:
    name: Publish New Version to Customer Manager
    needs: [all_builds_complete, setup_deployment]
    if: ${{ always() && needs.all_builds_complete.result == 'success' && needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Publish version
        env:
          ENVIRONMENT: ${{ needs.setup_deployment.outputs.environment }}
          TAG: ${{ needs.setup_deployment.outputs.tag }}
          CM_URL: ${{ needs.setup_deployment.outputs.cm_url }}
        run: |
          changelog="HiveArmor $TAG released"

          echo "Environment: $ENVIRONMENT"
          echo "CM URL: $CM_URL"
          echo "Tag: $TAG"

          # Select CM_SERVICE_ACCOUNT based on environment
          if [ "$ENVIRONMENT" = "dev" ]; then
            cmAuth=$(echo '${{ secrets.CM_SERVICE_ACCOUNT_DEV }}' | jq -r '.')
          else
            cmAuth=$(echo '${{ secrets.CM_SERVICE_ACCOUNT_PROD }}' | jq -r '.')
          fi

          id=$(echo "$cmAuth" | jq -r '.id')
          key=$(echo "$cmAuth" | jq -r '.key')

          body=$(jq -n \
            --arg version "$TAG" \
            --arg changelog "$changelog" \
            '{version: $version, changelog: $changelog}'
          )

          response=$(curl -s -X POST "${CM_URL}/api/v1/versions/register" \
            -H "Content-Type: application/json" \
            -H "id: $id" \
            -H "key: $key" \
            -d "$body")

          echo "Response: $response"

  schedule:
    name: Schedule release to our instances
    needs: [publish_new_version, setup_deployment]
    if: ${{ always() && needs.publish_new_version.result == 'success' && needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    env:
      ENVIRONMENT: ${{ needs.setup_deployment.outputs.environment }}
      TAG: ${{ needs.setup_deployment.outputs.tag }}
      CM_URL: ${{ needs.setup_deployment.outputs.cm_url }}
    steps:
      - name: Schedule updates
        run: |
          echo "🔍 Environment: $ENVIRONMENT"
          echo "🔍 Version: $TAG"
          echo "🔍 CM URL: $CM_URL"

          # Select instance IDs and auth based on environment
          if [ "$ENVIRONMENT" = "dev" ]; then
            instance_ids="${{ vars.SCHEDULE_INSTANCES_DEV }}"
            auth_json='${{ secrets.CM_SERVICE_ACCOUNT_DEV }}'
          else
            instance_ids="${{ vars.SCHEDULE_INSTANCES_PROD }}"
            auth_json='${{ secrets.CM_SERVICE_ACCOUNT_PROD }}'
          fi

          # Extract id and key from auth JSON
          auth_id=$(echo "$auth_json" | jq -r '.id')
          auth_key=$(echo "$auth_json" | jq -r '.key')

          # Parse IDs (handle single ID or comma-separated IDs)
          IFS=',' read -ra ID_ARRAY <<< "$instance_ids"

          # Iterate over each instance ID
          for instance_id in "${ID_ARRAY[@]}"; do
            instance_id=$(echo "$instance_id" | xargs)

            echo "📅 Scheduling release for instance: $instance_id"

            response=$(curl -s -w "\n%{http_code}" -X POST "${CM_URL}/api/v1/updates" \
              -H "Content-Type: application/json" \
              -H "id: $auth_id" \
              -H "key: $auth_key" \
              -d "{\"instances_ids\": [\"$instance_id\"], \"version\": \"$TAG\"}")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "✅ Successfully scheduled for instance: $instance_id"
            else
              echo "❌ Failed to schedule for instance: $instance_id (HTTP $http_code)"
              echo "Response: $body"
              exit 1
            fi
          done

          echo "✅ Scheduled release for all instances with version $TAG"



