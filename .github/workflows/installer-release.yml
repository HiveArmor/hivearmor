name: Installer Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., v11.2.0)'
        required: true
        type: string
      version_major:
        description: 'Major version (v10 or v11)'
        required: true
        type: string
      environment:
        description: 'Environment (dev or production)'
        required: true
        type: string
      prerelease:
        description: 'Whether this is a prerelease'
        required: false
        type: boolean
        default: false
      changelog:
        description: 'Changelog content for the release body'
        required: false
        type: string
        default: ''
    secrets:
      API_SECRET:
        required: false
      CM_ENCRYPT_SALT:
        required: false
      CM_SIGN_PUBLIC_KEY:
        required: false

jobs:
  # ============================================
  # V10 DEV - Deploy to runner only
  # ============================================
  deploy_v10_dev:
    name: Deploy V10 to Dev Runner
    runs-on: hivearmor-v10-dev
    if: inputs.version_major == 'v10' && inputs.environment == 'dev'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.20

      - name: Build and Deploy
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          echo "Building V10 Installer for dev environment"
          go build -o installer -v .
          mv installer /home/hivearmor/installer
          chmod +x /home/hivearmor/installer

      - name: Run Installer
        working-directory: /home/hivearmor
        run: |
          sudo ./installer

  # ============================================
  # V10 RC - Deploy to runner
  # ============================================
  deploy_v10_rc_runner:
    name: Deploy V10 to RC Runner
    runs-on: hivearmor-v10-rc
    if: inputs.version_major == 'v10' && inputs.environment == 'rc'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.20

      - name: Build and Deploy
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          echo "Building V10 Installer for rc environment"
          go build -o installer -v .
          mv installer /home/hivearmor/installer
          chmod +x /home/hivearmor/installer

      - name: Run Installer
        working-directory: /home/hivearmor
        run: |
          sudo ./installer

  # ============================================
  # V10 RC - Upload to prerelease
  # ============================================
  deploy_v10_rc_prerelease:
    name: Upload V10 Installer to Prerelease
    runs-on: ubuntu-24.04
    if: inputs.version_major == 'v10' && inputs.environment == 'rc'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.20

      - name: Prepare changelog
        id: changelog
        env:
          CHANGELOG_CONTENT: ${{ inputs.changelog }}
        run: |
          printf '%s' "$CHANGELOG_CONTENT" > /tmp/CHANGELOG.md

      - name: Build
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          echo "Building V10 Installer for prerelease"
          go build -o installer-linux-amd64 -v .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version }}
          body_path: /tmp/CHANGELOG.md
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            ./installer/installer-linux-amd64

  # ============================================
  # V11 DEV - Deploy to runner with dev branch
  # ============================================
  deploy_v11_dev:
    name: Deploy V11 to Dev Runner
    runs-on: hivearmor-v11-dev
    if: inputs.version_major == 'v11' && inputs.environment == 'dev'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.20

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.API_SECRET }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOPROXY=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOSUMDB=github.com/hivearmor" >> $GITHUB_ENV

      - name: Build and Deploy
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
          GOPRIVATE: github.com/hivearmor
          GONOPROXY: github.com/hivearmor
          GONOSUMDB: github.com/hivearmor
        run: |
          echo "Building V11 Installer for dev environment (branch=dev)"
          go build -o installer-linux-amd64 -v -ldflags "\
            -X 'github.com/hivearmor/installer/config.DEFAULT_BRANCH=dev' \
            -X 'github.com/hivearmor/installer/config.INSTALLER_VERSION=${{ inputs.version }}' \
            -X 'github.com/hivearmor/installer/config.REPLACE=${{ secrets.CM_ENCRYPT_SALT }}' \
            -X 'github.com/hivearmor/installer/config.PUBLIC_KEY=${{ secrets.CM_SIGN_PUBLIC_KEY }}'" .
          mv installer-linux-amd64 /usr/local/bin/hivearmor_installer
          chmod +x /usr/local/bin/hivearmor_installer

      - name: Run Installer
        run: |
          sudo /usr/local/bin/hivearmor_installer

  # ============================================
  # V11 Production - Build installer and upload to GitHub release.
  # ============================================
  build_v11_release:
    name: Build V11 Installer for Release
    runs-on: ubuntu-24.04
    if: inputs.version_major == 'v11' && inputs.environment == 'production'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.20

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.API_SECRET }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOPROXY=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOSUMDB=github.com/hivearmor" >> $GITHUB_ENV

      - name: Prepare changelog
        id: changelog
        env:
          CHANGELOG_CONTENT: ${{ inputs.changelog }}
        run: |
          printf '%s' "$CHANGELOG_CONTENT" > /tmp/CHANGELOG.md

      - name: Build
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
          GOPRIVATE: github.com/hivearmor
          GONOPROXY: github.com/hivearmor
          GONOSUMDB: github.com/hivearmor
        run: |
          echo "Building V11 Installer for release (branch=prod)"
          go build -o installer-linux-amd64 -v -ldflags "\
            -X 'github.com/hivearmor/installer/config.DEFAULT_BRANCH=prod' \
            -X 'github.com/hivearmor/installer/config.INSTALLER_VERSION=${{ inputs.version }}' \
            -X 'github.com/hivearmor/installer/config.REPLACE=${{ secrets.CM_ENCRYPT_SALT }}' \
            -X 'github.com/hivearmor/installer/config.PUBLIC_KEY=${{ secrets.CM_SIGN_PUBLIC_KEY }}'" .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version }}
          body_path: /tmp/CHANGELOG.md
          draft: false
          files: |
            ./installer/installer-linux-amd64
