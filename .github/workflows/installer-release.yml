name: Installer Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., v11.2.0)'
        required: true
        type: string
      version_major:
        description: 'Major version (v11)'
        required: true
        type: string
      environment:
        description: 'Environment (dev or production)'
        required: true
        type: string
      changelog:
        description: 'Changelog content for the release body'
        required: false
        type: string
        default: ''
    secrets:
      API_SECRET:
        required: false
      CM_ENCRYPT_SALT:
        required: false
      CM_SIGN_PUBLIC_KEY:
        required: false

jobs:
  # ============================================
  # DEV - Build and deploy to dev runner
  # ============================================
  deploy_v11_dev:
    name: Deploy Installer (Dev)
    runs-on: hivearmor-v11-dev
    if: inputs.environment == 'dev'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.API_SECRET }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOPROXY=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOSUMDB=github.com/hivearmor" >> $GITHUB_ENV

      - name: Build and Deploy
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
          GOPRIVATE: github.com/hivearmor
          GONOPROXY: github.com/hivearmor
          GONOSUMDB: github.com/hivearmor
        run: |
          echo "Building HiveArmor Installer for dev (branch=dev)"
          go build -o installer-linux-amd64 -v -ldflags "\
            -X 'github.com/hivearmor/installer/config.DEFAULT_BRANCH=dev' \
            -X 'github.com/hivearmor/installer/config.INSTALLER_VERSION=${{ inputs.version }}' \
            -X 'github.com/hivearmor/installer/config.REPLACE=${{ secrets.CM_ENCRYPT_SALT }}' \
            -X 'github.com/hivearmor/installer/config.PUBLIC_KEY=${{ secrets.CM_SIGN_PUBLIC_KEY }}'" .
          mv installer-linux-amd64 /usr/local/bin/hivearmor_installer
          chmod +x /usr/local/bin/hivearmor_installer

      - name: Run Installer
        run: |
          sudo /usr/local/bin/hivearmor_installer

  # ============================================
  # V11 Production - Build and upload to GitHub release
  # ============================================
  build_v11_release:
    name: Build Installer for Release
    runs-on: ubuntu-24.04
    if: inputs.environment == 'production'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.API_SECRET }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOPROXY=github.com/hivearmor" >> $GITHUB_ENV
          echo "GONOSUMDB=github.com/hivearmor" >> $GITHUB_ENV

      - name: Prepare changelog
        env:
          CHANGELOG_CONTENT: ${{ inputs.changelog }}
        run: |
          printf '%s' "$CHANGELOG_CONTENT" > /tmp/CHANGELOG.md

      - name: Build
        working-directory: ./installer
        env:
          GOOS: linux
          GOARCH: amd64
          GOPRIVATE: github.com/hivearmor
          GONOPROXY: github.com/hivearmor
          GONOSUMDB: github.com/hivearmor
        run: |
          echo "Building HiveArmor Installer for release (branch=prod)"
          go build -o installer-linux-amd64 -v -ldflags "\
            -X 'github.com/hivearmor/installer/config.DEFAULT_BRANCH=prod' \
            -X 'github.com/hivearmor/installer/config.INSTALLER_VERSION=${{ inputs.version }}' \
            -X 'github.com/hivearmor/installer/config.REPLACE=${{ secrets.CM_ENCRYPT_SALT }}' \
            -X 'github.com/hivearmor/installer/config.PUBLIC_KEY=${{ secrets.CM_SIGN_PUBLIC_KEY }}'" .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version }}
          body_path: /tmp/CHANGELOG.md
          draft: false
          files: |
            ./installer/installer-linux-amd64
