name: Reusable - Go dependency check

on:
  workflow_call:
    inputs:
      go_version:
        required: false
        type: string
        default: '1.23'
    secrets:
      API_SECRET:
        required: false
        description: "PAT with read access to private hivearmor/* Go modules. Without it, `go list -u -m -json all` fails on projects that import private repos."

jobs:
  deps:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      # Some projects in this monorepo (e.g. ./installer) depend on private
      # hivearmor/* modules. `go list -u -m -json all` tries to clone those
      # over HTTPS and fails without auth — same pattern the deploy pipelines
      # already use for `go build`.
      - name: Configure git for private Go modules
        if: ${{ env.HAS_API_SECRET == 'true' }}
        env:
          HAS_API_SECRET: ${{ secrets.API_SECRET != '' }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          git config --global url."https://${API_SECRET}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          {
            echo "GOPRIVATE=github.com/hivearmor"
            echo "GONOPROXY=github.com/hivearmor"
            echo "GONOSUMDB=github.com/hivearmor"
          } >> "$GITHUB_ENV"

      - name: Run go-deps.sh --check --discover
        id: run
        run: |
          mkdir -p /tmp/deps
          # Run the script but don't fail this job — we want the approver to
          # be the single gate. Capture stdout+stderr and the exit code.
          set +e
          bash .github/scripts/go-deps.sh --check --discover \
            > /tmp/deps/output.txt 2>&1
          code=$?
          set -e
          echo "$code" > /tmp/deps/exit_code.txt
          echo ""
          echo "--- script output ---"
          cat /tmp/deps/output.txt
          echo "--- exit code: $code ---"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-deps-result
          path: /tmp/deps/
          retention-days: 7
