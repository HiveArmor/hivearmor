name: V10 - Build & Deploy Pipeline

on:
  push:
    branches:
      - 'release/v10**'
      - 'v10'
  release:
    types: [ released ]

jobs:
  setup_deployment:
    name: Setup Deployment
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.set-env.outputs.tag }}
      environment: ${{ steps.set-env.outputs.environment }}
      release_tag: ${{ steps.set-env.outputs.release_tag }}
    steps:
      - name: Determine Build Environment
        id: set-env
        run: |
          # ===================
          # DEV — push to release/v10**
          # ===================
          if ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/v10') }}; then
            echo "DEV environment"
            echo "tag=v10-dev" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT

          # ===================
          # RC — push to v10
          # ===================
          elif ${{ github.event_name == 'push' && github.ref == 'refs/heads/v10' }}; then
            echo "RC environment"
            echo "tag=v10-rc" >> $GITHUB_OUTPUT
            echo "environment=rc" >> $GITHUB_OUTPUT
            echo "release_tag=v10-rc" >> $GITHUB_OUTPUT

          # ===================
          # PRODUCTION — release.released (non-prerelease publish)
          # Skip if tag doesn't start with v10 (this pipeline is for v10 only).
          # ===================
          elif ${{ github.event_name == 'release' && github.event.action == 'released' }}; then
            TAG="${{ github.event.release.tag_name }}"

            if [[ ! "$TAG" =~ ^v10\. ]]; then
              echo "⏭️ Skipping: Tag '$TAG' is not a v10 release."
              exit 0
            fi

            echo "PROD environment"
            echo "tag=v10" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          fi

  build_agent:
    name: Build and Sign Agent
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: hivearmor-signer
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Build Linux Agent
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service -v -ldflags "-X 'github.com/encryptshellorg/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

      - name: Build Windows Agent (amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service.exe -v -ldflags "-X 'github.com/encryptshellorg/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

      - name: Build Windows Agent (arm64)
        env:
          GOOS: windows
          GOARCH: arm64
        run: |
          cd ${{ github.workspace }}/agent
          go build -o hivearmor_agent_service_arm64.exe -v -ldflags "-X 'github.com/encryptshellorg/hivearmor/agent/config.REPLACE_KEY=${{ secrets.AGENT_SECRET_PREFIX }}'" .

      - name: Sign Windows Agents
        run: |
          cd ${{ github.workspace }}/agent
          signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ vars.SIGN_CERT }}" /csp "eToken Base Cryptographic Provider" /k "[{{${{ secrets.SIGN_KEY }}}}]=${{ secrets.SIGN_CONTAINER }}" "hivearmor_agent_service.exe"
          signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ vars.SIGN_CERT }}" /csp "eToken Base Cryptographic Provider" /k "[{{${{ secrets.SIGN_KEY }}}}]=${{ secrets.SIGN_CONTAINER }}" "hivearmor_agent_service_arm64.exe"

      - name: Upload signed binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-agents
          path: |
            ${{ github.workspace }}/agent/hivearmor_agent_service
            ${{ github.workspace }}/agent/hivearmor_agent_service.exe
            ${{ github.workspace }}/agent/hivearmor_agent_service_arm64.exe
          retention-days: 1

  build_agent_manager:
    name: Build Agent-Manager Image
    needs: [build_agent, setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code into the right branch
        uses: actions/checkout@v4

      - name: Download signed binaries from artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-agents
          path: ${{ github.workspace }}/agent

      - name: Prepare dependencies for Agent Manager Image
        run: |
          cd ${{ github.workspace }}/agent-manager
          GOOS=linux GOARCH=amd64  go build -o agent-manager -v .

          mkdir -p ./dependencies/collector
          curl -sSL "https://storage.googleapis.com/hivearmor-updates/dependencies/collector/linux-as400-collector.zip" -o ./dependencies/collector/linux-as400-collector.zip
          curl -sSL "https://storage.googleapis.com/hivearmor-updates/dependencies/collector/windows-as400-collector.zip" -o ./dependencies/collector/windows-as400-collector.zip

          mkdir -p ./dependencies/agent/
          curl -sSL "https://storage.googleapis.com/hivearmor-updates/dependencies/agent/hivearmor_agent_dependencies_linux.zip" -o ./dependencies/agent/hivearmor_agent_dependencies_linux.zip
          curl -sSL "https://storage.googleapis.com/hivearmor-updates/dependencies/agent/hivearmor_agent_dependencies_windows.zip" -o ./dependencies/agent/hivearmor_agent_dependencies_windows.zip
          curl -sSL "https://storage.googleapis.com/hivearmor-updates/dependencies/agent/hivearmor_agent_dependencies_windows_arm64.zip" -o ./dependencies/agent/hivearmor_agent_dependencies_windows_arm64.zip

          cp "${{ github.workspace }}/agent/hivearmor_agent_service" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/hivearmor_agent_service.exe" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/hivearmor_agent_service_arm64.exe" ./dependencies/agent/
          cp "${{ github.workspace }}/agent/version.json" ./dependencies/agent/
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hivearmor
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push the Agent Manager Image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-manager
          push: true
          tags: ghcr.io/hivearmor/hivearmor/agent-manager:${{ needs.setup_deployment.outputs.tag }}

  build_aws:
    name: Build AWS Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: aws
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_backend:
    name: Build Backend Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: backend
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '11'
      use_version_file: true
      maven_profile: 'prod'
      maven_goals: 'clean package'
  
  build_correlation:
    name: Build Correlation Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: correlation
      tag: ${{ needs.setup_deployment.outputs.tag }}

  build_frontend:
    name: Build Frontend Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-node.yml
    with:
      image_name: frontend
      tag: ${{ needs.setup_deployment.outputs.tag }}

  build_bitdefender:
    name: Build Bitdefender Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: bitdefender
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_mutate:
    name: Build Mutate Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-basic.yml
    with:
      image_name: mutate
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_office365:
    name: Build Office365 Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: office365
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_log_auth_proxy:
    name: Build Log-Auth-Proxy Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: log-auth-proxy
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_soc_ai:
    name: Build Soc-AI Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: soc-ai
      tag: ${{ needs.setup_deployment.outputs.tag }}
  
  build_sophos:
    name: Build Sophos Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-golang.yml
    with:
      image_name: sophos
      tag: ${{ needs.setup_deployment.outputs.tag }}

  build_user_auditor:
    name: Build User-Auditor Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: user-auditor
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '11'
      use_version_file: false
      maven_goals: 'clean install -U'
  
  build_web_pdf:
    name: Build Web-PDF Microservice
    needs: [setup_deployment]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    uses: ./.github/workflows/reusable-java.yml
    with:
      image_name: web-pdf
      tag: ${{ needs.setup_deployment.outputs.tag }}
      java_version: '11'
      use_version_file: false
      maven_goals: 'clean install -U'
  
  all_builds_complete:
    name: All Builds Complete
    needs: [
      setup_deployment,
      build_agent_manager,
      build_aws, build_backend, build_correlation, build_frontend,
      build_bitdefender, build_mutate, build_office365,
      build_log_auth_proxy, build_soc_ai, build_sophos,
      build_user_auditor, build_web_pdf
    ]
    if: ${{ needs.setup_deployment.outputs.tag != '' }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo "✅ All builds completed successfully"
  
  deploy_installer_dev:
    name: Deploy Installer (Dev)
    needs: [all_builds_complete, setup_deployment]
    if: ${{ needs.setup_deployment.outputs.environment == 'dev' }}
    uses: ./.github/workflows/installer-release.yml
    with:
      version: ${{ needs.setup_deployment.outputs.tag }}
      version_major: v10
      environment: dev

  deploy_installer_rc:
    name: Deploy Installer (RC)
    needs: [all_builds_complete, setup_deployment]
    if: ${{ needs.setup_deployment.outputs.environment == 'rc' }}
    uses: ./.github/workflows/installer-release.yml
    with:
      version: ${{ needs.setup_deployment.outputs.release_tag }}
      version_major: v10
      environment: rc
      prerelease: true
