name: CM Server — Build & Deploy

# Operator infrastructure pipeline — runs independently of the customer platform release.
# Triggered on changes to the cm-server source or manually.

on:
  push:
    branches:
      - main
    paths:
      - 'cm-server/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. v1.2.0 or latest)'
        required: false
        default: 'latest'

jobs:
  build:
    name: Build & Push CM Server
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "tag=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push CM Server Image
        uses: docker/build-push-action@v6
        with:
          context: ./cm-server
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/cm-server:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/cm-server:latest
