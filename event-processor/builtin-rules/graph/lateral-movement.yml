- name: "Multi-Stage Lateral Movement Kill Chain"
  type: graph_offense
  severity: 4
  category: "Lateral Movement"
  description: >
    A user account logged into multiple distinct hosts within 4 hours, and at least
    one of those hosts communicated with an external IP — consistent with multi-hop
    lateral movement followed by external exfiltration.
  mitre:
    tactics: ["TA0008"]
    attacks: ["T1021", "T1078"]

  cypherQuery: |
    MATCH (u:User)-[r1:LOGGED_INTO]->(h1:Host)-[c:COMMUNICATED_WITH]->(extIP:IpAddress),
          (u)-[r2:LOGGED_INTO]->(h2:Host)
    WHERE h1.hostname <> h2.hostname
      AND NOT extIP.address STARTS WITH '10.'
      AND NOT extIP.address STARTS WITH '192.168.'
      AND NOT extIP.address STARTS WITH '172.'
      AND r1.lastSeen > datetime() - duration('PT4H')
      AND r2.lastSeen > datetime() - duration('PT4H')
    RETURN u.username     AS user,
           h1.hostname    AS pivotHost,
           h2.hostname    AS targetHost,
           extIP.address  AS externalIP,
           u.riskScore    AS riskScore

  alertFields:
    - user
    - pivotHost
    - targetHost
    - externalIP
    - riskScore

  checkIntervalSeconds: 60
