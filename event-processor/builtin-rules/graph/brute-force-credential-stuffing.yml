- name: "Brute Force Credential Stuffing"
  type: graph_offense
  severity: 3
  category: "Credential Access"
  description: >
    A single host has had login attempts recorded for 5 or more distinct user
    accounts within the last hour — consistent with credential stuffing or
    password spray activity.
  mitre:
    tactics: ["TA0006"]
    attacks: ["T1110.004"]

  cypherQuery: |
    MATCH (u:User)-[r:LOGGED_INTO]->(h:Host)
    WHERE r.lastSeen > datetime() - duration('PT1H')
    WITH h, count(DISTINCT u) AS accountCount, collect(DISTINCT u.username)[0..10] AS accounts
    WHERE accountCount >= 5
    RETURN h.hostname     AS targetHost,
           accountCount,
           accounts,
           h.riskScore    AS riskScore

  alertFields:
    - targetHost
    - accountCount
    - accounts
    - riskScore

  checkIntervalSeconds: 120
