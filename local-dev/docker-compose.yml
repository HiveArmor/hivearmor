# =============================================================================
# HiveArmor Local Development - Docker Compose
# =============================================================================
# Usage:
#   cd local-dev
#   docker compose up -d
#
# Access:
#   UI:      https://localhost
#   API:     http://localhost:8080
#   OpenSearch: https://localhost:9200 (admin / $OPENSEARCH_INITIAL_ADMIN_PASSWORD)
#
# Note: Locally built images target the host native architecture (arm64 on Apple Silicon).
# Only web-pdf uses linux/amd64 (Selenium/Chrome requirement); runs via Rosetta on M-series.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Relational database for backend, agent-manager, user-auditor
  # ---------------------------------------------------------------------------
  postgres:
    image: hivearmor/postgres:local
    build:
      context: ../docker/postgres
      dockerfile: Dockerfile
    pull_policy: never
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5438:5432"
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=1000"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenSearch - Log storage and full-text search engine
  # ---------------------------------------------------------------------------
  opensearch:
    image: hivearmor/opensearch:local
    build:
      context: ..
      dockerfile: etc/opensearch/2.x/Dockerfile
    pull_policy: never
    environment:
      - cluster.name=hivearmor
      - node.name=node1
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - bootstrap.system_call_filter=false
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - JAVA_HOME=/usr/share/opensearch/jdk
      - action.auto_create_index=true
      - path.repo=/usr/share/opensearch
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - network.host=0.0.0.0
      - plugins.security.ssl.http.pemcert_filepath=certificates/opensearch.crt
      - plugins.security.ssl.http.pemkey_filepath=certificates/opensearch.key
      - plugins.security.ssl.http.pemtrustedcas_filepath=certificates/ca.crt
      - plugins.security.ssl.transport.pemcert_filepath=certificates/opensearch.crt
      - plugins.security.ssl.transport.pemkey_filepath=certificates/opensearch.key
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certificates/ca.crt
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - opensearch_backups:/usr/share/opensearch/backups
      - ./certs:/usr/share/opensearch/config/certificates:ro
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} | grep -qE 'green|yellow' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 3072M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Manager - gRPC server for endpoint agent management
  # ---------------------------------------------------------------------------
  agentmanager:
    image: hivearmor/agent-manager:local
    build:
      context: ..
      dockerfile: agent-manager/Dockerfile
    pull_policy: never
    environment:
      - DB_PATH=/data/hivearmor.db
      - INTERNAL_KEY=${INTERNAL_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - HA_HOST=http://backend:8080
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentmanager
      - PANEL_SERV_NAME=http://backend:8080
    volumes:
      - ./certs:/cert:ro
      - updates_data:/updates
    ports:
      - "9000:9000"
      - "9001:9001"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend - Java Spring Boot REST API
  # ---------------------------------------------------------------------------
  backend:
    image: hivearmor/backend:local
    build:
      context: ..
      dockerfile: backend/Dockerfile
    pull_policy: never
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - DB_USER=postgres
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hivearmor
      - ELASTICSEARCH_HOST=opensearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USER=admin
      - ELASTICSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - INTERNAL_KEY=${INTERNAL_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GRPC_AGENT_MANAGER_HOST=agentmanager
      - GRPC_AGENT_MANAGER_PORT=9000
      - EVENT_PROCESSOR_HOST=eventprocessor
      - EVENT_PROCESSOR_PORT=9002
      - SOC_AI_BASE_URL=http://eventprocessor:8090
      - APP_TFA_ENABLED=false
      - ELASTICSEARCH_CA_CERT=/cert/ca.crt
      - JHIPSTER_CORS_ALLOWED__ORIGINS=${JHIPSTER_CORS_ALLOWED_ORIGINS}
    volumes:
      - datasources_data:/etc/hivearmor
      - updates_data:/updates
      - ./certs:/cert:ro
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      agentmanager:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Event Processor - Log correlation engine (manager mode)
  # ---------------------------------------------------------------------------
  eventprocessor:
    image: hivearmor/event-processor:local
    build:
      context: ..
      dockerfile: event-processor/Dockerfile
    pull_policy: never
    environment:
      - WORK_DIR=/workdir
      - LOG_LEVEL=200
      - GIN_MODE=release
      - MODE=manager
      - NODE_NAME=manager
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - BACKEND_URL=http://backend:8080
      - INTERNAL_KEY=${INTERNAL_KEY}
      - EVENTPROCESSOR_INJECT_KEY=${EVENTPROCESSOR_INJECT_KEY}
      - KAFKA_BROKER=redpanda:9092
      - KAFKA_ENABLED=true
      - OTLP_PORT=4317
    volumes:
      - ep_pipeline:/workdir/pipeline
      - ep_logs:/workdir/logs
      - ep_rules:/workdir/rules/hivearmor
      - ep_sockets:/workdir/sockets
      - ./certs:/cert:ro
      - updates_data:/updates
    ports:
      - "8000:8000"
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      backend:
        condition: service_started
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2048M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Event Processor Worker - runs the inputs plugin (MODE=worker) so it
  # accepts log ingestion from agents, hivearmor-collector, and OTLP sources.
  # ---------------------------------------------------------------------------
  eventprocessor-worker:
    image: hivearmor/event-processor:local
    pull_policy: never
    environment:
      - WORK_DIR=/workdir
      - LOG_LEVEL=200
      - GIN_MODE=release
      - MODE=worker
      - NODE_NAME=worker
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - BACKEND_URL=http://backend:8080
      - INTERNAL_KEY=${INTERNAL_KEY}
      - EVENTPROCESSOR_INJECT_KEY=${EVENTPROCESSOR_INJECT_KEY}
      - KAFKA_BROKER=redpanda:9092
      - KAFKA_ENABLED=true
      - OTLP_PORT=4317
      - INPUTS_SOCKET_SECRET=${INPUTS_SOCKET_SECRET:-change-me-in-production}
    volumes:
      - ep_pipeline:/workdir/pipeline
      - ep_logs:/workdir/logs
      - ep_rules:/workdir/rules/hivearmor
      - ep_sockets:/workdir/sockets
      - ./certs:/cert:ro
      - updates_data:/updates
      - ./hivearmor_plugins.yaml:/workdir/pipeline/hivearmor_plugins.yaml:ro
    ports:
      - "50051:50051"      # HiveArmor gRPC (agents/collector)
      - "4317:4317"        # OTLP gRPC
      - "4318:4318"        # OTLP HTTP (future)
    depends_on:
      eventprocessor:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # User Auditor - Tracks user sessions and activity
  # ---------------------------------------------------------------------------
  user-auditor:
    image: hivearmor/user-auditor:local
    build:
      context: ../user-auditor
      dockerfile: Dockerfile
    pull_policy: never
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - INTERNAL_KEY=${INTERNAL_KEY}
      - DB_USER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=userauditor
      - DB_PASS=${POSTGRES_PASSWORD}
      - ELASTICSEARCH_HOST=opensearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USER=admin
      - ELASTICSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - ELASTICSEARCH_CA_CERT=/cert/ca.crt
    volumes:
      - ./certs:/cert:ro
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/utm-auditor-users-by-src || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web PDF - Report generation service (Selenium-based)
  # ---------------------------------------------------------------------------
  web-pdf:
    image: hivearmor/web-pdf:local
    build:
      context: ../web-pdf
      dockerfile: Dockerfile
    pull_policy: never
    platform: linux/amd64
    volumes:
      - shm_data:/dev/shm
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/ | grep -q 'error' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend v2 - Next.js SIEM UI
  # ---------------------------------------------------------------------------
  frontend-v2:
    image: hivearmor/frontend-v2:local
    build:
      context: ../frontend-v2
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8080
    pull_policy: never
    environment:
      - BACKEND_URL=http://backend:8080
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Neo4j - Security Knowledge Graph (entity relationship store)
  # Browser: http://localhost:7474  Login: neo4j / $NEO4J_PASSWORD
  # Bolt:    bolt://localhost:7687
  # ⚠️  DEV ONLY — schema is mounted at /docker-entrypoint-initdb.d/schema.cypher;
  #    apply once with: docker exec hivearmor-neo4j cypher-shell -u neo4j -p "$NEO4J_PASSWORD" -f /docker-entrypoint-initdb.d/schema.cypher
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.20-community
    container_name: hivearmor-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - 'NEO4J_PLUGINS=["apoc"]'
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    ports:
      - "7474:7474"    # HTTP browser
      - "7687:7687"    # Bolt protocol
    volumes:
      - neo4j_data:/data
      - ./neo4j/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda - Kafka-compatible message bus (no ZooKeeper)
  # External Kafka API: localhost:19092
  # Admin API:          localhost:19644
  # ⚠️  DEV ONLY — replace broker URL with managed Kafka for production.
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v23.3.21
    container_name: hivearmor-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 768M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"   # External Kafka API
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # HTTP Proxy
      - "19644:9644"    # Admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.*true'"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda Console - Topic browser and consumer group monitor
  # Access: http://localhost:8081
  # ⚠️  DEV ONLY
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: redpandadata/console:v2.4.6
    container_name: hivearmor-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - REDPANDA_ADMINAPI_ENABLED=true
      - REDPANDA_ADMINAPI_URLS=http://redpanda:9644
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Setup - Creates required topics once on first start
  # ---------------------------------------------------------------------------
  kafka-setup:
    image: redpandadata/redpanda:v23.3.21
    container_name: hivearmor-kafka-setup
    entrypoint: /bin/bash
    depends_on:
      redpanda:
        condition: service_healthy
    command: -c "sleep 5 && bash /scripts/create-topics.sh"
    volumes:
      - ./kafka-setup:/scripts
    restart: "no"

  # ---------------------------------------------------------------------------
  # OpenSearch Dashboards - Index management, dev tools, query UI
  # ⚠️  DEV ONLY — REMOVE THIS SERVICE BEFORE DEPLOYING TO PRODUCTION.
  #    Dashboards exposes full cluster admin access and is not hardened
  #    for production use. Remove this entire block + the volume below.
  # Access: http://localhost:5601  Login: admin / $OPENSEARCH_INITIAL_ADMIN_PASSWORD
  # ---------------------------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Entity Graph - Kafka → Neo4j entity/relationship builder
  # Consumes hivearmor.processed.events and upserts entities into Neo4j.
  # ---------------------------------------------------------------------------
  entity-graph:
    image: hivearmor/entity-graph:local
    build:
      context: ../entity-graph
      dockerfile: Dockerfile
    pull_policy: never
    container_name: hivearmor-entity-graph
    environment:
      - KAFKA_BROKER=redpanda:9092
      - KAFKA_CONSUMER_GROUP=hivearmor-entity-graph
      - KAFKA_TOPIC=hivearmor.processed.events
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-localdev123!}
    depends_on:
      redpanda:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OTel Collector sidecar - optional fan-in aggregator (start with --profile otelcol)
  # External OTLP gRPC: localhost:4319  External OTLP HTTP: localhost:4320
  # Usage: docker compose --profile otelcol up -d
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: hivearmor-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4319:4317"   # External OTLP gRPC (separate port to avoid conflict with eventprocessor)
      - "4320:4318"   # External OTLP HTTP
    networks:
      - default
    profiles:
      - otelcol
    depends_on:
      eventprocessor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  opensearch_backups:
  updates_data:
  datasources_data:
  ep_pipeline:
  ep_logs:
  ep_rules:
  ep_sockets:
  shm_data:
  neo4j_data:
