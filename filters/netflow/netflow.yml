# Netflow firewall module filter, version 3.1.1
# Based in docs and Netflow Generator (Solarwinds) for send log
# 
# Documentations
# 1- https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html 
# 2- http://www.iana.org/assignments/ipfix/ipfix.xhtml 
# 3- https://helpdesk.kaseya.com/hc/en-gb/articles/115003522631-How-to-view-NetFlow-in-WireShark 
# 4- https://www.solarwinds.com/free-tools/
# 
# Implementation
# 1. Parsing the RAW field containing the Netflow
pipeline:
  - dataTypes:
      - netflow
    steps:

      # Using the kv filter with default config, usefull in key-value logs
      - kv:
          fieldSplit: " "
          valueSplit: "="

      # Remove fields that have issues with kv filter
      - delete:
          fields:
            - log.msg
      
      # Using grok to parse kv issued fields
      - grok:
          patterns:
            - fieldName: log.irrelevant
              pattern: '{{.data}}(msg=)'
            - fieldName: log.msg
              pattern: '{{.data}}({{.word}}=)'
            - fieldName: log.irrelevant
              pattern: '{{.greedy}}'
          source: log.kvMessage

      # Using grok to remove irrelevant data
      - grok:
          patterns:
            - fieldName: log.msg
              pattern: '{{.greedy}}{{.space}}'
            - fieldName: log.irrelevant
              pattern: '{{.word}}(=)'
          source: log.msg

      # Using grok to parse fields that have issues with kv filter
      - grok:
          patterns:
            - fieldName: log.irrelevant
              pattern: '{{.data}}bytes="\['
            - fieldName: log.totalBytes
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant1
              pattern: '{{.data}}packets="\['
            - fieldName: log.totalPackets
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant2
              pattern: '{{.data}}inEth="\['
            - fieldName: log.inEthernet
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant3
              pattern: '{{.data}}outEth="\['
            - fieldName: log.outEthernet
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant4
              pattern: '{{.data}}proto="/\['
            - fieldName: log.protocol
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant5
              pattern: '{{.data}}srcPort="\['
            - fieldName: log.srcPortg
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant6
              pattern: '{{.data}}dstPort="\['
            - fieldName: log.dstPortg
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant7
              pattern: '{{.data}}dstMask="\['
            - fieldName: log.destMask
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant8
              pattern: '{{.data}}srcMask="\['
            - fieldName: log.sourceMask
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant9
              pattern: '{{.data}}tcpFlags="\['
            - fieldName: log.tcpFlgs
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant10
              pattern: '{{.data}}dstAs="\['
            - fieldName: log.destAs
              pattern: '{{.data}}\]"'
          source: raw

      - grok:
          patterns:
            - fieldName: log.irrelevant11
              pattern: '{{.data}}srcAs="\['
            - fieldName: log.sourceAs
              pattern: '{{.data}}\]"'
          source: raw

      # Rename filds
      - rename:
          from:
            - log.srcIp
          to: origin.ip
      - rename:
          from:
            - log.dstIp
          to: target.ip
      - rename:
          from:
            - log.src_ip
          to: origin.ip
      - rename:
          from:
            - log.dest_ip
          to: target.ip
              
      # Remove unused caracters and estandarize fields
      - trim:
          function: prefix
          substring: '"'
          fields:
            - log.bytesIn
            - log.bytesOut
            - log.exporter
            - log.first
            - log.last
            - log.nextHop
            - log.packetsIn
            - log.packetsOut
            - log.version
            - target.ip
            - origin.ip

      - trim:
          function: suffix
          substring: '"'
          fields:
            - log.bytesIn
            - log.bytesOut
            - log.exporter
            - log.first
            - log.last
            - log.nextHop
            - log.packetsIn
            - log.packetsOut
            - log.version
            - target.ip
            - origin.ip

      - trim:
          function: suffix
          substring: ']"'
          fields:
            - log.totalBytes
            - log.totalPackets
            - log.inEthernet
            - log.outEthernet
            - log.protocol
            - log.srcPortg
            - log.src_port
            - log.dstPortg
            - log.dest_port
            - log.destMask
            - log.sourceMask
            - log.tcpFlgs
            - log.destAs
            - log.sourceAs

      - trim:
          function: prefix
          substring: '0'
          fields:
            - log.srcPortg
            - log.src_port
            - log.dstPortg
            - log.dest_port

      - trim: 
          function: substring
          substring: " "
          fields:
            - log.srcPortg
            - log.src_port
            - log.dstPortg
            - log.dest_port

      # Fields conversions
      - cast:
          to: 'int'
          fields:
            - log.srcPortg
            - log.src_port
            - log.dstPortg
            - log.dest_port

      # Rename fields to fields base
      - rename:
          from:
            - log.srcPortg
          to: origin.port
      - rename:
          from:
            - log.src_port
          to: origin.port
      - rename:
          from:
            - log.dstPortg
          to: target.port
      - rename:
          from:
            - log.dest_port
          to: target.port

      # Adding geolocation to origin.ip
      - dynamic:
          plugin: com.hivearmor.geolocation
          params:
            source: origin.ip
            destination: origin.geolocation
          where: exists("origin.ip")
      
      # Adding geolocation to target.ip
      - dynamic:
          plugin: com.hivearmor.geolocation
          params:
            source: target.ip
            destination: target.geolocation
          where: exists("target.ip")

      # Adding protocol field based on IANA protocol numbers
      - add:
          function: "string"
          params:
            key: protocol
            value: "HOPOPT"
          where: equals("log.protocol", "0")
      - add:
          function: "string"
          params:
            key: protocol
            value: "ICMP"
          where: equals("log.protocol", "1")
      - add:
