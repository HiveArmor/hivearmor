# Rule version v1.0.0

dataTypes:
  - azure
name: Azure Key Vault Excessive Access Detected
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Collection
technique: "T1530 - Data from Cloud Storage Object"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/key-vault/general/logging
  - https://attack.mitre.org/techniques/T1530/
description: |
  Detects unusual spikes in Azure Key Vault access patterns. Monitors for multiple secret retrieval operations from the same source, which could indicate credential harvesting or data exfiltration attempts.
  
  Next Steps:
  1. Investigate the source IP address and verify if it's a legitimate system or user
  2. Review the specific secrets/keys being accessed and their criticality
  3. Check for any recent changes to Key Vault access policies
  4. Correlate with user authentication logs to identify the account responsible
  5. Verify if the access pattern aligns with normal business operations
  6. Consider implementing additional access controls or monitoring if suspicious activity is confirmed
where: |
  equals("log.category", "AuditEvent") &&
  oneOf("log.operationName", ["SecretGet", "SecretList", "KeyGet"])
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.category
        operator: filter_term
        value: 'AuditEvent'
    within: 10m
    count: 20
groupBy:
  - lastEvent.log.resourceId
  - adversary.ip
