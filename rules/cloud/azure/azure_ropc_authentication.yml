# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD Resource Owner Password Credentials Flow Detected
impact:
  confidentiality: 2
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1078 - Valid Accounts"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/entra/identity-platform/v2-oauth-ropc
  - https://attack.mitre.org/techniques/T1078/
description: |
  Detects use of the Resource Owner Password Credentials (ROPC) OAuth flow in Azure AD. ROPC sends plain-text credentials directly to the token endpoint, bypassing MFA and conditional access. It is commonly abused by attackers for credential stuffing and automated account compromise.

  Next Steps:
  1. Identify the application using ROPC flow and verify its legitimacy
  2. Check if the application has a legitimate need for ROPC (legacy/headless apps)
  3. Review the source IPs making ROPC requests for suspicious patterns
  4. Check for high volumes of failed ROPC requests (credential stuffing)
  5. Migrate the application to a modern auth flow (authorization code, device code)
  6. If unauthorized, block the application and reset affected user passwords
where: |
  contains("log.properties", "urn:ietf:params:oauth:grant-type:password") ||
  (contains("log.operationName", "Sign-in") && contains("log.properties", "ropc"))
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 1h
    count: 5
groupBy:
  - adversary.ip
  - adversary.user
