# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD Password Spray Attack Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1110 - Brute Force"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/active-directory/identity-protection/concept-identity-protection-risks
  - https://attack.mitre.org/techniques/T1110/
description: |
  Detects password spray attacks against Azure AD by correlating failed sign-in attempts across multiple usernames from the same source IP within a short time window. Password spraying tries common passwords against many accounts to avoid account lockout thresholds.

  Next Steps:
  1. Identify the source IP and check threat intelligence feeds for known malicious sources
  2. Review the list of targeted user accounts for patterns (executives, admins, service accounts)
  3. Check if any of the targeted accounts subsequently had successful logins
  4. Verify that account lockout policies are properly configured
  5. Block the source IP at the network level if confirmed malicious
  6. Enable Azure AD Smart Lockout for brute force protection
  7. Implement Conditional Access policies requiring MFA
  8. Review password policies and enforce complexity requirements
where: |
  contains("log.operationName", "Sign-in activity") &&
  (equals("log.properties.status.errorCode", "50126") ||
   equals("log.properties.status.errorCode", "50053") ||
   equals("log.properties.status.errorCode", "50057")) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.properties.status.errorCode
        operator: filter_match
        value: '5005'
    within: 15m
    count: 15
groupBy:
  - lastEvent.log.operationName
  - adversary.ip
