# Rule version v1.0.4

dataTypes:
  - azure
name: "Azure Key Vault Modified"
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: "Credential Access"
technique: "T1552 - Unsecured Credentials"
adversary: target
description: "Identifies modifications to a Key Vault in Azure. The Key Vault is a service that safeguards encryption keys and secrets like certificates, 
              connection strings, and passwords. Because this data is sensitive and business critical, access to key vaults should be secured to allow 
              only authorized applications and users. Adversaries may modify Key Vault configurations to weaken security controls, add unauthorized access policies, 
              or change network rules to facilitate credential theft and unauthorized access to sensitive secrets."
references:
  - "https://attack.mitre.org/techniques/T1552/"
  - "https://attack.mitre.org/tactics/TA0006/"
  - "https://learn.microsoft.com/en-us/azure/key-vault/general/security-features"
where: |
  (equalsIgnoreCase("log.category", "Administrative") || contains("log.category", "Activity")) &&
  (equalsIgnoreCase("log.operationName", "MICROSOFT.KEYVAULT/VAULTS/WRITE") ||
  contains("log.operationName", "Microsoft.KeyVault/vaults/write")) &&
  equals("log.resultType", "0")
groupBy:
  - target.ip
  - target.user
