# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD Bulk Privileged Role Assignment Changes
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Privilege Escalation
technique: "T1098 - Account Manipulation"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/entra/id-governance/privileged-identity-management/pim-resource-roles-assign-roles
  - https://attack.mitre.org/techniques/T1098/
description: |
  Detects mass privileged role assignment changes in Azure AD. Multiple role assignments in a short time window indicate an attacker rapidly escalating privileges across multiple accounts for persistence and lateral movement.

  Next Steps:
  1. Review all role assignments made in the burst
  2. Identify the admin account making the changes
  3. Check if these changes were part of an approved onboarding or migration
  4. Review the specific roles assigned (Global Admin, Exchange Admin, etc.)
  5. If unauthorized, revert all role assignments and investigate the admin account
  6. Enable Azure PIM for just-in-time role activation
where: |
  contains("log.operationName", "Add member to role") ||
  contains("log.operationName", "Add eligible member to role")
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 30m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
