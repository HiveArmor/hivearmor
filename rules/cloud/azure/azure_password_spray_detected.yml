# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD Password Spray Attack Detected
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1110.003 - Brute Force: Password Spraying"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/entra/id-protection/concept-identity-protection-risks
  - https://attack.mitre.org/techniques/T1110/003/
description: |
  Detects Azure Identity Protection password spray attack signals. Microsoft's ML-based detection identifies distributed password spray attempts across multiple accounts using common passwords.

  Next Steps:
  1. Identify all affected user accounts in the password spray
  2. Check if any accounts were successfully compromised
  3. Force password resets for all targeted accounts
  4. Review source IPs for known attack infrastructure
  5. Check for successful sign-ins from the same source IPs
  6. Enable smart lockout policies if not already configured
  7. Review MFA enforcement across all targeted accounts
where: |
  contains("log.operationName", "Password Spray") ||
  (contains("log.properties", "riskEventType") && contains("log.properties", "passwordSpray"))
groupBy:
  - lastEvent.log.operationName
  - adversary.ip
