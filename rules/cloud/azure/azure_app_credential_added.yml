# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD Application Credential Added
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Persistence
technique: "T1098.001 - Account Manipulation: Additional Cloud Credentials"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/entra/identity-platform/howto-create-service-principal-portal
  - https://attack.mitre.org/techniques/T1098/001/
description: |
  Detects when new certificates or client secrets are added to Azure AD application registrations. This is the primary Azure AD persistence technique - attackers add credentials to existing apps to maintain access even after password resets.

  Next Steps:
  1. Verify the credential addition was authorized by the application owner
  2. Identify the application and its permissions (especially Graph API permissions)
  3. Check the user identity adding the credential for legitimacy
  4. Review the credential type (certificate vs secret) and expiration
  5. Check for subsequent sign-ins using the new application credential
  6. If unauthorized, remove the credential and rotate all app secrets
  7. Review the application's API permissions for excessive access
where: |
  oneOf("log.operationName", ["Add service principal credentials", "Update application - Certificates and secrets management"]) ||
  (contains("log.operationName", "application") && contains("log.properties", "KeyCredentials"))
groupBy:
  - lastEvent.log.properties.targetResources
  - adversary.user
