# Rule version v1.0.0

dataTypes:
  - azure
name: Azure Kubernetes Secret Write or Delete
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Credential Access
technique: "T1552.007 - Unsecured Credentials: Container API"
adversary: origin
references:
  - https://kubernetes.io/docs/concepts/configuration/secret/
  - https://attack.mitre.org/techniques/T1552/007/
description: |
  Detects write or delete operations on Kubernetes Secrets in Azure Kubernetes Service. Secrets contain sensitive data like service account tokens, TLS certificates, and database credentials. Unauthorized access indicates potential credential theft or data tampering.

  Next Steps:
  1. Identify the user or service account accessing the secrets
  2. Review which secrets were accessed, modified, or deleted
  3. Check if the operation was part of a legitimate deployment workflow
  4. Audit the RBAC permissions of the identity performing the action
  5. If unauthorized, rotate all affected secrets immediately
  6. Review pod specifications for secrets mounted as volumes or environment variables
where: |
  contains("log.operationName", "MICROSOFT.CONTAINERSERVICE") &&
  contains("log.properties", "secrets") &&
  (contains("log.properties", "create") || contains("log.properties", "update") || contains("log.properties", "delete") || contains("log.properties", "patch"))
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 30m
    count: 5
groupBy:
  - lastEvent.log.resourceId
  - adversary.user
