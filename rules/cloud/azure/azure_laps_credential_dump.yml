# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AD LAPS Password Recovery
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1003 - OS Credential Dumping"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/entra/identity/devices/howto-manage-local-admin-passwords
  - https://attack.mitre.org/techniques/T1003/
description: |
  Detects Local Administrator Password Solution (LAPS) password recovery from Entra ID. While LAPS recovery is a legitimate admin operation, excessive or unauthorized recovery attempts indicate credential dumping for lateral movement.

  Next Steps:
  1. Verify the user recovering the LAPS password has legitimate need
  2. Check the target device and whether the user is responsible for it
  3. Review the frequency of LAPS password recoveries by this user
  4. Correlate with subsequent RDP or SMB connections to the target device
  5. If unauthorized, rotate the LAPS password and investigate the user's activities
  6. Review RBAC for LAPS password read permissions
where: |
  contains("log.operationName", "Recover device local administrator password") ||
  (contains("log.operationName", "Read device local administrator password") && exists("log.properties"))
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 1h
    count: 3
groupBy:
  - adversary.ip
  - adversary.user
