# Rule version v1.0.0

dataTypes:
  - azure
name: Azure Security Alert Suppression Rule Created
impact:
  confidentiality: 2
  integrity: 3
  availability: 2
category: Defense Evasion
technique: "T1562 - Impair Defenses"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/defender-for-cloud/alerts-suppression-rules
  - https://attack.mitre.org/techniques/T1562/
description: |
  Detects creation of alert suppression rules in Azure Defender / Microsoft Defender for Cloud. Attackers create suppression rules to hide security alerts generated by their activities.

  Next Steps:
  1. Review the suppression rule and what alert types it suppresses
  2. Verify the rule creation was part of an authorized security operations workflow
  3. Check the user identity for legitimate security team membership
  4. Review recent security alerts that may have been suppressed
  5. If unauthorized, delete the suppression rule and review suppressed alerts
  6. Check for other defense evasion activities from the same user
where: |
  regexMatch("log.operationName", "(?i)MICROSOFT\\.SECURITY/ALERTSSUPPRESSIONRULES/WRITE")
groupBy:
  - lastEvent.log.operationName
  - adversary.user
