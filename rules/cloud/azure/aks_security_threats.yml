# Rule version v1.0.0

dataTypes:
  - azure
name: Azure AKS Container Security Threat Detection
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Execution
technique: "T1610 - Deploy Container"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/defender-for-cloud/defender-for-containers-introduction
  - https://attack.mitre.org/techniques/T1610/
description: |
  Detects suspicious container operations in Azure Kubernetes Service (AKS) including privileged pod creation, container exec commands, and potential container escape attempts. These activities may indicate an attacker attempting to deploy malicious workloads or escape container isolation.

  Next Steps:
  1. Review the Kubernetes audit logs for the specific pod or container operation
  2. Check if the container image is from an approved registry
  3. Verify the service account and RBAC permissions used for the operation
  4. Examine pod security context for privileged flags, host network, or host PID access
  5. Review the container command for suspicious payloads or reverse shells
  6. If unauthorized, delete the pod and investigate the cluster for further compromise
  7. Implement Azure Policy for AKS to enforce pod security standards
  8. Enable Microsoft Defender for Containers for runtime protection
where: |
  (contains("log.operationName", "Microsoft.ContainerService") ||
   contains("log.operationName", "MICROSOFT.KUBERNETES")) &&
  (contains("log.operationName", "write") ||
   contains("log.operationName", "create") ||
   contains("log.operationName", "exec")) &&
  equals("log.resultType", "Success")
afterEvents:
  - indexPattern: v11-log-azure-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.operationName
        operator: filter_match
        value: 'Container'
    within: 30m
    count: 10
groupBy:
  - lastEvent.log.operationName
  - adversary.ip
