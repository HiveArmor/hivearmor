# Rule version v1.0.3

dataTypes:
  - "aws"
name: "AWS S3 Bucket Configuration Deletion"
impact:
  confidentiality: 3
  integrity: 2
  availability: 2
category: "Defense Evasion"
technique: "T1070 - Indicator Removal"
adversary: origin
description: "Identifies the deletion of various Amazon Simple Storage Service (S3) bucket configuration components"
references:
  - "https://attack.mitre.org/techniques/T1070/"
  - "https://attack.mitre.org/tactics/TA0005/"
  - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucketPolicy.html"
  - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucketReplication.html"
  - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucketCors.html"
  - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucketEncryption.html"
  - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucketLifecycle.html"
where: |
  equals("log.eventSource", "s3.amazonaws.com") &&
  oneOf("log.eventName", ["DeleteBucketPolicy", "DeleteBucketReplication",
  "DeleteBucketCors", "DeleteBucketEncryption", "DeleteBucketLifecycle"])
groupBy:
  - adversary.ip
  - adversary.user
