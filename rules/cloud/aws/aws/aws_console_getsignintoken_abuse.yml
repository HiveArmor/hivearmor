# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Console GetSigninToken Abuse
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1550.001 - Use Alternate Authentication Material: Application Access Token"
adversary: origin
references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_providers_enable-console-custom-url.html
  - https://attack.mitre.org/techniques/T1550/001/
description: |
  Detects GetSigninToken API calls which allow federated users to get a console sign-in token. Attackers abuse this to pivot from programmatic credentials to console access, potentially bypassing MFA requirements.

  Next Steps:
  1. Verify the federated sign-in was from an authorized user and application
  2. Check the source IP and user agent for legitimacy
  3. Review what actions were performed in the console after sign-in
  4. Correlate with the original AssumeRole call that created the federated session
  5. Check if MFA was properly enforced on the original authentication
  6. If unauthorized, revoke the federated session immediately
where: |
  equals("log.eventSource", "signin.amazonaws.com") &&
  equals("log.eventName", "GetSigninToken") &&
  equals("log.errorCode", "")
groupBy:
  - adversary.user
  - lastEvent.log.sourceIPAddress
