# Rule version v1.0.0

dataTypes:
  - aws
name: AWS EC2 Snapshot Shared with External Account
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Exfiltration
technique: "T1537 - Transfer Data to Cloud Account"
adversary: origin
references:
  - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ebs-modifying-snapshot-permissions.html
  - https://attack.mitre.org/techniques/T1537/
description: |
  Detects ModifySnapshotAttribute API calls that share EBS snapshots with external AWS accounts. Attackers exfiltrate data by sharing snapshots containing sensitive data with accounts they control.

  Next Steps:
  1. Identify the shared snapshot and its contents
  2. Verify the target account ID is a known and authorized account
  3. Check the user identity and source IP for legitimacy
  4. Review the snapshot's source volume for sensitive data
  5. If unauthorized, immediately remove the sharing permission
  6. Check for other snapshots shared around the same time
  7. Review IAM policies to restrict snapshot sharing
where: |
  equals("log.eventSource", "ec2.amazonaws.com") &&
  equals("log.eventName", "ModifySnapshotAttribute") &&
  equals("log.errorCode", "") &&
  contains("log.requestParameters", "createVolumePermission")
groupBy:
  - adversary.user
  - lastEvent.log.requestParameters.snapshotId
