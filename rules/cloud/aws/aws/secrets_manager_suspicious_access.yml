# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Secrets Manager Suspicious Access Pattern
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1552.004 - Private Keys"
adversary: origin
references:
  - https://docs.aws.amazon.com/secretsmanager/latest/userguide/monitoring-cloudtrail.html
  - https://attack.mitre.org/techniques/T1552/004/
description: |
  Detects unusual access patterns to AWS Secrets Manager that could indicate credential theft or unauthorized access attempts. This rule monitors for multiple GetSecretValue or BatchGetSecretValue operations from the same source within a short time window, which may indicate an attacker attempting to harvest credentials.
  
  Next Steps:
  1. Review the CloudTrail logs for the identified user/role to understand which secrets were accessed
  2. Check if the accessing identity has legitimate business need for these secrets
  3. Verify if the access pattern matches normal usage for this identity
  4. Review the source IP addresses and locations for anomalies
  5. If unauthorized, immediately rotate the accessed secrets and review IAM permissions
  6. Check for any subsequent API calls using potentially compromised credentials
where: equals("log.eventSource", "secretsmanager.amazonaws.com") && (equals("log.eventName", "GetSecretValue") || equals("log.eventName", "BatchGetSecretValue")) && equals("log.errorCode", "")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventName
        operator: filter_term
        value: GetSecretValue
    within: 10m
    count: 10
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventName
        operator: filter_term
        value: BatchGetSecretValue
    within: 10m
    count: 5
groupBy:
  - lastEvent.log.sourceIPAddress
  - lastEvent.log.userIdentityArn
