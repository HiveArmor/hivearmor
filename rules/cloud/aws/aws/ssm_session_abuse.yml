# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Systems Manager Session Abuse
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Lateral Movement
technique: "T1021 - Remote Services"
adversary: origin
references:
  - https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager.html
  - https://attack.mitre.org/techniques/T1021/
description: |
  Detects suspicious use of AWS Systems Manager (SSM) for remote access including StartSession, SendCommand, and SendSSHPublicKey. Attackers use SSM to establish interactive sessions or execute commands on EC2 instances without requiring direct SSH access or security group changes.

  Next Steps:
  1. Verify the IAM principal initiating the SSM session is authorized for remote access
  2. Review the target instance(s) and confirm legitimate operational need
  3. Check the commands sent via SendCommand for suspicious payloads
  4. Review the source IP address for unusual origins
  5. Examine the timing of the session for off-hours access
  6. If unauthorized, terminate active sessions and review instance for compromise
  7. Implement SSM session logging to S3 and CloudWatch for audit trails
  8. Restrict SSM access using IAM policies with condition keys
where: |
  equals("log.eventSource", "ssm.amazonaws.com") &&
  oneOf("log.eventName", ["StartSession", "ResumeSession", "SendCommand", "StartAutomationExecution"]) &&
  equals("log.errorCode", "")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventSource
        operator: filter_term
        value: ssm.amazonaws.com
    within: 30m
    count: 5
groupBy:
  - adversary.user
  - lastEvent.log.eventName
