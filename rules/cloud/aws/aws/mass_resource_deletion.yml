# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Mass Resource Deletion
impact:
  confidentiality: 1
  integrity: 3
  availability: 3
category: Impact
technique: "T1485 - Data Destruction"
adversary: origin
references:
  - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html
  - https://attack.mitre.org/techniques/T1485/
description: |
  Detects mass deletion of AWS resources which could indicate destructive attack or insider threat. Monitors for multiple delete operations across various AWS services within a 10-minute window.
  
  Next Steps:
  1. Immediately identify the user/role performing the deletions through the userIdentity.arn field
  2. Review CloudTrail logs to determine the scope and specific resources being deleted
  3. Contact the user to verify if these actions are authorized
  4. If unauthorized, immediately revoke the user's AWS credentials and permissions
  5. Enable MFA delete protection on critical resources if not already enabled
  6. Consider implementing SCPs (Service Control Policies) to prevent mass deletions
  7. Review and restore deleted resources from backups if necessary
  8. Document the incident and update IAM policies to prevent future occurrences
where: (contains("log.eventName", "Delete") || contains("log.eventName", "Terminate") || contains("log.eventName", "Remove")) && equals("log.errorCode", "") && !equals("log.eventSource", "s3.amazonaws.com")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentity.arn
        operator: filter_term
        value: '{{.log.userIdentity.arn}}'
    within: 10m
    count: 15
groupBy:
  - lastEvent.log.sourceIPAddress
  - lastEvent.log.userIdentity.arn
