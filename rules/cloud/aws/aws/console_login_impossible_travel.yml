# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Console Login Impossible Travel Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1078.004 - Valid Accounts: Cloud Accounts"
adversary: origin
references:
  - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-user-identity.html
  - https://attack.mitre.org/techniques/T1078/004/
description: |
  Detects AWS Console logins from different geographic locations within a short time window, indicating potential credential compromise. This correlation identifies when the same user authenticates from different countries within 30 minutes, which would be physically impossible.

  Next Steps:
  1. Review the login locations and IP addresses for the affected user
  2. Check if the user employs a VPN or proxy service that could explain different geolocations
  3. Verify with the user whether both login sessions are legitimate
  4. Review the actions performed in each session for suspicious activity
  5. If unauthorized, immediately disable the user account and rotate credentials
  6. Enable MFA if not already configured for the affected account
  7. Review CloudTrail logs for any API calls made during the suspicious session
  8. Check for concurrent sessions from the compromised account
where: |
  equals("log.eventName", "ConsoleLogin") &&
  equals("log.responseElements.ConsoleLogin", "Success") &&
  exists("origin.geolocation.countryCode")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventName
        operator: filter_term
        value: ConsoleLogin
      - field: origin.geolocation.countryCode
        operator: must_not_term
        value: '{{.origin.geolocation.countryCode}}'
    within: 30m
    count: 1
groupBy:
  - adversary.user
  - adversary.geolocation.countryCode
