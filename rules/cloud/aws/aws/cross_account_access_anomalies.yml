# Rule version v1.0.0

dataTypes:
  - aws
name: AWS Cross-Account Access Anomalies
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Unauthorized Access
technique: "T1550.001 - Use Alternate Authentication Material: Application Access Token"
adversary: origin
references:
  - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-user-identity.html
  - https://attack.mitre.org/techniques/T1550/001/
description: |
  Detects anomalous cross-account access patterns in AWS that may indicate account compromise or privilege escalation. Monitors for AssumeRole activities across different accounts where the assumed role ARN does not match the originating account ID, potentially indicating unauthorized cross-account access.
  
  Next Steps:
  1. Verify if the cross-account access was authorized by checking AWS IAM policies and trust relationships
  2. Review the source IP address to determine if it matches known corporate IP ranges or expected locations
  3. Check the assumed role permissions to understand what access was granted
  4. Look for any subsequent API calls made using the assumed role credentials
  5. Contact the owner of the originating account to verify if the activity was legitimate
  6. If unauthorized, immediately revoke the assumed role session and review all IAM trust policies
where: |
  equals("log.eventSource", "sts.amazonaws.com") && 
  equals("log.eventName", "AssumeRole") &&
  exists("log.userIdentityAccountId") &&
  exists("log.responseElementsAssumedRoleUserArn") &&
  exists("log.sourceIPAddress") &&
  equals("log.errorCode", "") &&
  !contains(safe(log.responseElementsAssumedRoleUserArn, ""), safe(log.userIdentityAccountId, ""))
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.sourceIPAddress
        operator: filter_term
        value: '{{.log.sourceIPAddress}}'
      - field: log.eventName
        operator: filter_term
        value: 'AssumeRole'
    within: 15m
    count: 15
groupBy:
  - lastEvent.log.responseElementsAssumedRoleUserArn
  - lastEvent.log.sourceIPAddress
  - lastEvent.log.userIdentityAccountId
