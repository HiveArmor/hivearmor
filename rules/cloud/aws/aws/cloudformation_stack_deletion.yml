# Rule version v1.0.0

dataTypes:
  - aws
name: AWS CloudFormation Stack Deletion
impact:
  confidentiality: 1
  integrity: 3
  availability: 3
category: Impact
technique: "T1485 - Data Destruction"
adversary: origin
references:
  - https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/logging-cloudformation-api-calls.html
  - https://attack.mitre.org/techniques/T1485/
description: |
  Detects deletion of CloudFormation stacks which could indicate destructive actions by an attacker or unauthorized infrastructure changes. This rule monitors for DeleteStack operations that could result in loss of critical infrastructure. Multiple stack deletions from the same user within a short time frame may indicate malicious activity.
  
  Next Steps:
  1. Verify if the stack deletion was authorized and part of planned maintenance
  2. Check the user identity who performed the deletion and validate if they should have this permission
  3. Review CloudTrail logs for other destructive actions by the same user
  4. Examine what resources were contained in the deleted stack
  5. If unauthorized, immediately revoke the user's permissions and investigate for other compromise indicators
  6. Consider enabling stack termination protection on critical stacks
  7. Review and implement least privilege access policies for CloudFormation operations
where: equals("log.eventSource", "cloudformation.amazonaws.com") && equals("log.eventName", "DeleteStack") && equals("log.errorCode", "")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventSource
        operator: filter_term
        value: 'cloudformation.amazonaws.com'
    within: 30m
    count: 5
groupBy:
  - lastEvent.log.userIdentityAccountId
  - lastEvent.log.userIdentityArn
