# Rule version v1.0.0

dataTypes:
  - aws
name: AWS SSM SendCommand Remote Execution
impact:
  confidentiality: 2
  integrity: 3
  availability: 2
category: Execution
technique: "T1059 - Command and Scripting Interpreter"
adversary: origin
references:
  - https://docs.aws.amazon.com/systems-manager/latest/userguide/run-command.html
  - https://attack.mitre.org/techniques/T1059/
description: |
  Detects AWS Systems Manager SendCommand API calls which allow remote command execution on EC2 instances. Attackers with sufficient IAM permissions abuse SSM to execute commands across multiple instances without SSH/RDP access.

  Next Steps:
  1. Review the command document and parameters sent to the instances
  2. Verify the user identity has legitimate need for remote command execution
  3. Check the target instances and whether they should be managed via SSM
  4. Review the command output for suspicious activity
  5. Correlate with instance-level logs for the executed commands
  6. If unauthorized, cancel pending commands and investigate the user
where: |
  equals("log.eventSource", "ssm.amazonaws.com") &&
  oneOf("log.eventName", ["SendCommand", "StartSession"]) &&
  equals("log.errorCode", "")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.userIdentityArn
        operator: filter_term
        value: '{{.log.userIdentityArn}}'
      - field: log.eventSource
        operator: filter_term
        value: 'ssm.amazonaws.com'
    within: 30m
    count: 5
groupBy:
  - adversary.user
  - lastEvent.log.eventName
