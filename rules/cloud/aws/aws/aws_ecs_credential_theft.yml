# Rule version v1.0.0

dataTypes:
  - aws
name: AWS ECS Task Credential Endpoint Query
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1552.005 - Unsecured Credentials: Cloud Instance Metadata API"
adversary: origin
references:
  - https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task-iam-roles.html
  - https://attack.mitre.org/techniques/T1552/005/
description: |
  Detects queries to the ECS task credential endpoint that may indicate container credential theft. Attackers who compromise a container can query the credential endpoint to steal IAM role credentials attached to the ECS task.

  Next Steps:
  1. Identify the ECS task and cluster involved
  2. Check if the API calls were from expected task processes
  3. Review the IAM role attached to the task for excessive permissions
  4. Check for lateral movement using the stolen credentials
  5. Investigate the container image and running processes for compromise
  6. If unauthorized, rotate the task role credentials and investigate the container
where: |
  equals("log.eventSource", "ecs.amazonaws.com") &&
  oneOf("log.eventName", ["DescribeTaskDefinition", "RunTask", "StartTask"]) &&
  equals("log.errorCode", "") &&
  equals("log.userIdentityType", "AssumedRole") &&
  contains("log.userIdentityArn", ":assumed-role/")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: log.sourceIPAddress
        operator: filter_term
        value: '{{.log.sourceIPAddress}}'
      - field: log.eventSource
        operator: filter_term
        value: 'ecs.amazonaws.com'
    within: 30m
    count: 5
groupBy:
  - adversary.user
  - lastEvent.log.sourceIPAddress
