# Rule version v1.0.3

dataTypes:
  - "aws"
name: "AWS Management Console Brute Force of Root User Identity"
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: "Credential Access"
technique: "T1110 - Brute Force"
adversary: origin
description: "Identifies a high number of failed authentication attempts to the AWS management console for the Root user identity. An adversary may attempt to brute force the password for the Root user identity, as it has complete access to all services and resources for the AWS account"
references:
  - "https://attack.mitre.org/tactics/TA0006/"
  - "https://attack.mitre.org/techniques/T1110/"
  - "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html"
where: |
  equals("log.eventSource", "signin.amazonaws.com") &&
  equals("log.eventName", "ConsoleLogin") &&
  equals("log.userIdentityType", "root") &&
  (exists("log.errorCode") || exists("log.errorMessage"))
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 5
groupBy:
  - adversary.ip
  - adversary.user
