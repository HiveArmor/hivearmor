# Rule version v1.0.0

dataTypes:
  - aws
name: "AWS Root Login Without MFA"
impact:
  confidentiality: 3
  integrity: 2
  availability: 2
category: "Initial Access"
technique: "T1078 - Valid Accounts"
adversary: origin
description: "Identifies attempts to login to AWS as the root user without using multi-factor authentication (MFA). Amazon AWS best practices indicate that the root user should be protected by MFA"
references:
  - "https://attack.mitre.org/tactics/TA0004/"
  - "https://attack.mitre.org/techniques/T1078/"
  - "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html"
where: |
  equals("log.eventSource", "signin.amazonaws.com") &&
  equals("log.eventName", "ConsoleLogin") &&
  equals("log.userIdentityType", "root") &&
  equals("log.additionalEventData.MFAUsed", "no")
groupBy:
  - adversary.ip
  - adversary.user
