# Rule version v1.0.3

dataTypes:
  - "aws"
name: "AWS IAM Brute Force of Assume Role Policy"
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: "Credential Access"
technique: "T1110 - Brute Force"
adversary: origin
description: "Identifies a high number of failed attempts to assume an AWS Identity and Access Management (IAM) role.
              IAM roles are used to delegate access to users or services. An adversary may attempt to enumerate IAM 
              roles in order to determine if a role exists before attempting to assume or hijack the discovered role"
references:
  - "https://attack.mitre.org/tactics/TA0006/"
  - "https://attack.mitre.org/techniques/T1110/"
  - "https://www.praetorian.com/blog/aws-iam-assume-role-vulnerabilities"
  - "https://rhinosecuritylabs.com/aws/assume-worst-aws-assume-role-enumeration/"
where: |
  equals("log.eventSource", "iam.amazonaws.com") &&
  equals("log.eventName", "UpdateAssumeRolePolicy") &&
  equals("log.errorCode", "MalformedPolicyDocumentException")
afterEvents:
  - indexPattern: v11-log-aws-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
    within: 15m
    count: 5
groupBy:
  - adversary.ip
  - adversary.user
