# Rule version v1.0.0

dataTypes:
  - google
name: Cloud Identity Suspicious Sign-ins Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Initial Access
technique: "T1078 - Valid Accounts"
adversary: origin
references:
  - https://support.google.com/cloudidentity/answer/4580120?hl=en
  - https://cloud.google.com/blog/products/identity-security/logs-based-security-alerting-in-google-cloud
  - https://attack.mitre.org/techniques/T1078/
description: |
  Detects suspicious sign-in attempts to Google Cloud Identity, including logins from unfamiliar locations, unusual IP addresses, or after multiple failed attempts. These could indicate compromised credentials or unauthorized access attempts.
  
  Next Steps:
  1. Verify the legitimacy of the login attempt with the user
  2. Check if the IP address is from a known malicious source
  3. Review recent account activity for signs of compromise
  4. Consider implementing additional MFA if not already enabled
  5. If confirmed malicious, reset user credentials immediately
  6. Review access logs for any unauthorized activities
where: |
  equals("log.protoPayloadServiceName", "login.googleapis.com") && 
  (
    equals("log.protoPayload.metadata.event.type", "Suspicious Login") ||
    (equals("log.protoPayload.metadata.event.type", "login") && equals("log.protoPayload.metadata.event.parameter.is_suspicious", true)) ||
    equals("log.protoPayload.metadata.event.parameter.is_suspicious", true)
  )
groupBy:
  - lastEvent.origin.user
  - adversary.ip
