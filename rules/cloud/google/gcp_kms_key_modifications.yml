# Rule version v1.0.0

dataTypes:
  - google
name: GCP KMS Key Destruction or Disabling
impact:
  confidentiality: 1
  integrity: 3
  availability: 3
category: Impact
technique: "T1552 - Unsecured Credentials"
adversary: origin
references:
  - https://cloud.google.com/kms/docs/destroy-restore
  - https://attack.mitre.org/techniques/T1552/
description: |
  Detects destruction or disabling of Cloud KMS key versions which could render encrypted data unrecoverable. Attackers may destroy encryption keys as part of a destructive attack to prevent data recovery or to disrupt operations dependent on encrypted resources.

  Next Steps:
  1. Immediately verify if the KMS key operation was authorized
  2. Identify which resources are encrypted with the affected key
  3. Check if the key version is in the scheduled destruction period and can be restored
  4. Review the identity performing the operation and verify authorization
  5. Assess the business impact of the key becoming unavailable
  6. If unauthorized, restore the key version immediately during the destruction grace period
  7. Implement IAM conditions to restrict KMS key destruction permissions
  8. Enable Cloud KMS key rotation policies and cross-region key replication
where: |
  contains("log.protoPayloadServiceName", "cloudkms.googleapis.com") &&
  (contains("log.protoPayloadMethodName", "DestroyCryptoKeyVersion") ||
   contains("log.protoPayloadMethodName", "DisableCryptoKeyVersion") ||
   contains("log.protoPayloadMethodName", "UpdateCryptoKeyPrimaryVersion"))
groupBy:
  - lastEvent.log.protoPayloadResourceName
  - adversary.user
