# Rule version v1.0.3

dataTypes:
  - google
name: "GCP account is probably used for spamming"
impact:
  confidentiality: 1
  integrity: 2
  availability: 3
category: "Initial Access"
technique: "T1566 - Phishing"
adversary: origin
description: "A user's account was disabled because Google has become aware that it was used to engage in spamming.
                Usually, spamming is used to perform other attacks like phishing or spread malware."
references:
  - "https://attack.mitre.org/tactics/TA0001"
  - "https://attack.mitre.org/techniques/T1566/"
where: |
  equals("log.protoPayloadMethodName", "google.login.LoginService.accountDisabledSpamming") ||
  equals("log.protoPayloadMethodName", "google.login.LoginService.accountDisabledSpammingThroughRelay")
groupBy:
  - adversary.ip
  - adversary.user
