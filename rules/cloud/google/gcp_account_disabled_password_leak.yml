# Rule version v1.0.3

dataTypes:
  - google
name: "GCP detected account with password leak"
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: "Initial Access"
technique: "T1078 - Valid Accounts"
adversary: origin
description: "A user's account was disabled because a password leak was detected by google."
references:
  - "https://attack.mitre.org/tactics/TA0001/"
  - "https://attack.mitre.org/techniques/T1078"
where: |
  equals("log.protoPayloadMethodName", "google.login.LoginService.accountDisabledPasswordLeak")
groupBy:
  - adversary.ip
  - adversary.user
