# Rule version v1.0.0

dataTypes:
  - google
name: GCP Cloud Function and Cloud Run Abuse
impact:
  confidentiality: 2
  integrity: 2
  availability: 1
category: Persistence
technique: "T1059 - Command and Scripting Interpreter"
adversary: origin
references:
  - https://cloud.google.com/functions/docs/securing
  - https://attack.mitre.org/techniques/T1059/
description: |
  Detects creation or modification of Cloud Functions and Cloud Run services which can be used for persistence, backdoor access, or command execution. Attackers may deploy serverless functions with high-privilege service accounts to maintain access or exfiltrate data.

  Next Steps:
  1. Review the function or service code for malicious content
  2. Check the associated service account and its permissions
  3. Verify the deployer identity has authorization
  4. Review the function trigger configuration (HTTP, Pub/Sub, etc.)
  5. Check if the function allows unauthenticated invocations
  6. If unauthorized, delete the function and revoke the service account's permissions
  7. Review invocation logs for the function
  8. Implement Organization Policy to restrict Cloud Function deployment
where: |
  ((contains("log.protoPayloadServiceName", "cloudfunctions.googleapis.com") &&
    (contains("log.protoPayloadMethodName", "CreateFunction") ||
     contains("log.protoPayloadMethodName", "UpdateFunction"))) ||
   (contains("log.protoPayloadServiceName", "run.googleapis.com") &&
    (contains("log.protoPayloadMethodName", "CreateService") ||
     contains("log.protoPayloadMethodName", "ReplaceService"))))
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
