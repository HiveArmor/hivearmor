# Rule version v1.0.0

dataTypes:
  - google
name: GCP Project Manipulation and Shadow Projects
impact:
  confidentiality: 2
  integrity: 3
  availability: 3
category: Account Manipulation
technique: "T1578 - Modify Cloud Compute Infrastructure"
adversary: origin
references:
  - https://cloud.google.com/resource-manager/docs/creating-managing-projects
  - https://attack.mitre.org/techniques/T1578/
description: |
  Detects GCP project creation, deletion, and undelete operations that could indicate shadow project creation for persistence or project deletion for impact. Attackers may create new projects outside organizational controls to host malicious workloads.

  Next Steps:
  1. Verify the project creation or deletion was authorized
  2. Check if the new project is within the expected folder hierarchy
  3. Review the project's billing account association
  4. Examine IAM bindings on the new project for overly permissive access
  5. Check if Organization Policies are applied to the new project
  6. If unauthorized, shut down the project and investigate the creating identity
  7. Implement Organization Policy constraints for project creation
  8. Enable alerts for projects created outside approved folders
where: |
  contains("log.protoPayloadServiceName", "cloudresourcemanager.googleapis.com") &&
  (contains("log.protoPayloadMethodName", "CreateProject") ||
   contains("log.protoPayloadMethodName", "DeleteProject") ||
   contains("log.protoPayloadMethodName", "UndeleteProject"))
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
