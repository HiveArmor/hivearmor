# Rule version v1.0.0

dataTypes:
  - google
name: Google Cloud Service Account Key Creation Spike
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Credential Access
technique: Account Manipulation
adversary: origin
references:
  - https://cloud.google.com/iam/docs/audit-logging/examples-service-accounts
  - https://attack.mitre.org/techniques/T1098/001/
description: |
  Detects spikes in service account key creation which could indicate credential harvesting or preparation for unauthorized access. Service account keys provide long-term credentials that can be used to authenticate as the service account. Multiple key creations by the same user within a short timeframe may indicate malicious activity or preparation for privilege escalation attacks.
  
  Next Steps:
  1. Investigate the user account creating multiple service account keys
  2. Review the service accounts for which keys were created and their permissions
  3. Check if the key creation was authorized and follows organizational policies
  4. Examine subsequent activities performed using these service account credentials
  5. Verify if the keys were created from expected IP addresses and locations
  6. Review access patterns and identify any unusual resource access or API calls
  7. Consider rotating or disabling the created keys if unauthorized activity is confirmed
where: |
  equals("log.protoPayloadMethodName", "google.iam.admin.v1.CreateServiceAccountKey") &&
  equals("log.protoPayloadServiceName", "iam.googleapis.com")
afterEvents:
  - indexPattern: v11-log-google-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
    within: 1h
    count: 5
groupBy:
  - lastEvent.origin.user
  - lastEvent.log.protoPayloadMethodName
