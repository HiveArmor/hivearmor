# Rule version v1.0.0

dataTypes:
  - google
name: Binary Authorization Bypass Detection
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Defense Evasion
technique: "T1553 - Subvert Trust Controls"
adversary: origin
references:
  - https://cloud.google.com/binary-authorization/docs/audit-logging
  - https://cloud.google.com/binary-authorization/docs/run/using-breakglass-cloud-run
  - https://attack.mitre.org/techniques/T1553/
description: |
  Detects attempts to bypass Binary Authorization controls including use of breakglass deployments, policy violations, and unauthorized container deployments. These events could indicate attempts to deploy untrusted or malicious container images.
  
  Next Steps:
  1. Verify the legitimacy of the breakglass deployment or policy bypass
  2. Review the container image source and verify its authenticity
  3. Check if the user had proper authorization for emergency deployments
  4. Examine the deployment context and business justification
  5. Validate that security policies are restored after emergency deployment
  6. Monitor for any subsequent suspicious activity from deployed containers
where: |
  (
    equals("log.protoPayloadServiceName", "binaryauthorization.googleapis.com") && 
    (
      contains("log.logName", "cloudaudit.googleapis.com/system_event") &&
      (contains("log.protoPayload.response.details", "breakglass") || equals("log.jsonPayload.breakglass", true))
    )
  ) ||
  (
    equals("log.resourceType", "cloud_run_revision") &&
    contains("log.logName", "cloudaudit.googleapis.com/system_event") &&
    (
      contains("log.protoPayload.response.status.conditions", "ContainerImageUnauthorized") ||
      equals("log.jsonPayload.policyViolation", true) ||
      equals("log.protoPayload.metadata.dryRun", true)
    )
  )
groupBy:
  - lastEvent.origin.user
  - lastEvent.log.protoPayloadResourceName
