# Rule version v1.0.0

dataTypes:
  - google
name: GCP Custom Role with Overly Permissive Permissions
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Privilege Escalation
technique: "T1098 - Account Manipulation"
adversary: origin
references:
  - https://cloud.google.com/iam/docs/creating-custom-roles
  - https://attack.mitre.org/techniques/T1098/
description: |
  Detects creation or modification of GCP custom IAM roles which may include overly permissive permissions for privilege escalation. Attackers may create custom roles with broad permissions like iam.serviceAccountKeys.create, iam.serviceAccounts.actAs, or compute.instances.setMetadata to escalate privileges.

  Next Steps:
  1. Review the custom role definition and its included permissions
  2. Verify the role follows least privilege principles
  3. Check for high-risk permissions like iam.* or resourcemanager.*
  4. Review the identity creating the role and verify authorization
  5. Check which users or service accounts are bound to the role
  6. If overly permissive, modify the role to include only necessary permissions
  7. Implement Organization Policy to restrict custom role creation
  8. Use IAM Recommender to identify and reduce excess permissions
where: |
  contains("log.protoPayloadServiceName", "iam.googleapis.com") &&
  (contains("log.protoPayloadMethodName", "CreateRole") ||
   contains("log.protoPayloadMethodName", "UpdateRole"))
afterEvents:
  - indexPattern: v11-log-google-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
    within: 1h
    count: 2
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
