# Rule version v1.0.0

dataTypes:
  - google
name: GCP Cloud Storage Data Exfiltration
impact:
  confidentiality: 3
  integrity: 1
  availability: 1
category: Data Exfiltration
technique: "T1530 - Data from Cloud Storage Object"
adversary: origin
references:
  - https://cloud.google.com/storage/docs/access-control
  - https://attack.mitre.org/techniques/T1530/
description: |
  Detects GCP Cloud Storage operations indicating potential data exfiltration including making buckets publicly accessible, modifying IAM policies to grant allUsers access, or bulk object downloads. These actions may indicate an attacker attempting to exfiltrate data from cloud storage.

  Next Steps:
  1. Review the affected bucket and its data classification
  2. Check if the bucket was made publicly accessible
  3. Verify the identity making the change has authorization
  4. Review the IAM policy changes for allUsers or allAuthenticatedUsers bindings
  5. Check for bulk GetObject operations following the policy change
  6. If unauthorized, revert the bucket IAM policy and enable uniform bucket-level access
  7. Review VPC Service Controls for the project
  8. Enable Cloud Storage audit logging for data access events
where: |
  contains("log.protoPayloadServiceName", "storage.googleapis.com") &&
  (contains("log.protoPayloadMethodName", "storage.setIamPermissions") ||
   contains("log.protoPayloadMethodName", "storage.buckets.update") ||
   contains("log.protoPayloadMethodName", "storage.objects.update")) &&
  (contains("log.protoPayload.request.policy.bindings", "allUsers") ||
   contains("log.protoPayload.request.policy.bindings", "allAuthenticatedUsers") ||
   contains("log.protoPayload.request.acl", "allUsers"))
groupBy:
  - lastEvent.log.protoPayloadResourceName
  - adversary.user
