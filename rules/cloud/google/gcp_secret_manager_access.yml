# Rule version v1.0.0

dataTypes:
  - google
name: GCP Secret Manager Bulk Access Detection
impact:
  confidentiality: 3
  integrity: 1
  availability: 1
category: Credential Access
technique: "T1552 - Unsecured Credentials"
adversary: origin
references:
  - https://cloud.google.com/secret-manager/docs/audit-logging
  - https://attack.mitre.org/techniques/T1552/
description: |
  Detects bulk access to GCP Secret Manager secrets which may indicate credential harvesting. Attackers who gain access to a GCP project may enumerate and retrieve all stored secrets to obtain API keys, database credentials, and other sensitive data.

  Next Steps:
  1. Review which secrets were accessed and their sensitivity classification
  2. Verify the identity accessing the secrets has legitimate need
  3. Check the access pattern for unusual timing or volume
  4. Review the caller's IP address and user agent for anomalies
  5. Determine if the accessed secrets have been used from unauthorized locations
  6. If unauthorized, rotate all accessed secrets immediately
  7. Review Secret Manager IAM bindings and apply least privilege
  8. Enable VPC Service Controls to restrict secret access
where: |
  contains("log.protoPayloadServiceName", "secretmanager.googleapis.com") &&
  contains("log.protoPayloadMethodName", "AccessSecretVersion")
afterEvents:
  - indexPattern: v11-log-google-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: log.protoPayloadMethodName
        operator: filter_term
        value: AccessSecretVersion
    within: 15m
    count: 5
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
