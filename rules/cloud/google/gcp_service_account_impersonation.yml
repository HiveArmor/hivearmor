# Rule version v1.0.0

dataTypes:
  - google
name: GCP Service Account Impersonation Detection
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Credential Access
technique: "T1550.001 - Use Alternate Authentication Material: Application Access Token"
adversary: origin
references:
  - https://cloud.google.com/iam/docs/create-short-lived-credentials-direct
  - https://attack.mitre.org/techniques/T1550/001/
description: |
  Detects service account impersonation through token generation APIs including GenerateAccessToken, GenerateIdToken, and SignBlob. Attackers may impersonate service accounts to escalate privileges or access resources the service account has been granted.

  Next Steps:
  1. Verify the identity performing the impersonation is authorized
  2. Check the target service account and its IAM bindings
  3. Review the permissions available through the impersonated service account
  4. Examine the API calls made using the generated token
  5. Verify if the impersonation is part of a legitimate workload chain
  6. If unauthorized, remove the iam.serviceAccountTokenCreator role from the caller
  7. Review the service account's access patterns for anomalies
  8. Implement Organization Policy constraints to limit service account impersonation
where: |
  (contains("log.protoPayloadMethodName", "GenerateAccessToken") ||
   contains("log.protoPayloadMethodName", "GenerateIdToken") ||
   contains("log.protoPayloadMethodName", "SignBlob") ||
   contains("log.protoPayloadMethodName", "SignJwt")) &&
  contains("log.protoPayloadServiceName", "iamcredentials.googleapis.com")
afterEvents:
  - indexPattern: v11-log-google-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
    within: 30m
    count: 10
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
