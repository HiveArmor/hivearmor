# Rule version v1.0.0

dataTypes:
  - google
name: GCP Workload Identity Federation Abuse
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Credential Access
technique: "T1078 - Valid Accounts"
adversary: origin
references:
  - https://cloud.google.com/iam/docs/workload-identity-federation
  - https://attack.mitre.org/techniques/T1078/
description: |
  Detects creation or modification of workload identity pools and providers that enable external identities to access GCP resources. Attackers may create workload identity configurations to grant access to external attacker-controlled identity providers for persistent cloud access.

  Next Steps:
  1. Review the workload identity pool and provider configuration
  2. Verify the external identity provider is trusted and authorized
  3. Check the attribute mappings and conditions for overly permissive access
  4. Review which service accounts are bound to the workload identity pool
  5. Verify the change was authorized through security change management
  6. If unauthorized, delete the workload identity pool and revoke associated permissions
  7. Audit all existing workload identity configurations for unauthorized providers
  8. Implement Organization Policy to restrict workload identity pool creation
where: |
  contains("log.protoPayloadServiceName", "iam.googleapis.com") &&
  (contains("log.protoPayloadMethodName", "CreateWorkloadIdentityPool") ||
   contains("log.protoPayloadMethodName", "CreateWorkloadIdentityPoolProvider") ||
   contains("log.protoPayloadMethodName", "UpdateWorkloadIdentityPool") ||
   contains("log.protoPayloadMethodName", "UpdateWorkloadIdentityPoolProvider"))
groupBy:
  - lastEvent.log.protoPayloadMethodName
  - adversary.user
