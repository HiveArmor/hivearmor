# Rule version v1.0.0

dataTypes:
  - google
name: GCP Network Packet Capture Configuration
impact:
  confidentiality: 3
  integrity: 1
  availability: 1
category: Credential Access
technique: "T1040 - Network Sniffing"
adversary: origin
references:
  - https://cloud.google.com/vpc/docs/packet-mirroring
  - https://attack.mitre.org/techniques/T1040/
description: |
  Detects creation or modification of Packet Mirroring configurations in GCP. Attackers use packet mirroring to capture network traffic for credential theft, data exfiltration, or reconnaissance.

  Next Steps:
  1. Verify the packet mirroring configuration was authorized for legitimate purposes
  2. Review the mirrored network scope (which subnets, instances, protocols)
  3. Check the collector destination for the mirrored traffic
  4. Identify the user who created the configuration
  5. If unauthorized, delete the packet mirroring policy immediately
  6. Review the mirrored traffic destination for data exfiltration
  7. Check for captured credentials or sensitive data
where: |
  contains("log.protoPayloadMethodName", "PacketMirrorings") &&
  (contains("log.protoPayloadMethodName", "insert") || contains("log.protoPayloadMethodName", "patch") || contains("log.protoPayloadMethodName", "create"))
groupBy:
  - lastEvent.origin.user
  - lastEvent.log.protoPayloadResourceName
