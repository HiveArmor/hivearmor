# Rule version v1.0.0

dataTypes:
  - github
name: GitHub CODEOWNERS File Modification
impact:
  confidentiality: 2
  integrity: 3
  availability: 1
category: Defense Evasion
technique: "T1562.001 - Impair Defenses: Disable or Modify Tools"
adversary: origin
references:
  - https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners
  - https://attack.mitre.org/techniques/T1562/001/
description: |
  Detects modifications to CODEOWNERS files which define required reviewers for code changes. Attackers may modify CODEOWNERS to remove review requirements for sensitive paths, enabling them to merge malicious code without proper review.

  Next Steps:
  1. Review the CODEOWNERS file changes and identify removed or modified ownership rules
  2. Check if critical paths (workflows, configs, secrets) lost their code owners
  3. Verify the committer is an authorized repository administrator
  4. Review PRs merged after the CODEOWNERS change for unreviewed code
  5. Check if branch protection still requires CODEOWNERS review
  6. If unauthorized, revert the CODEOWNERS change and review recent merges
  7. Implement branch protection rules requiring CODEOWNERS approval
  8. Set up alerts on changes to repository configuration files
where: |
  (equals("log.action", "git.push") || equals("log.action", "repo.update_file")) &&
  exists("log.senderLogin") &&
  contains("log.commitMessage", "CODEOWNERS")
afterEvents:
  - indexPattern: v11-log-github-*
    with:
      - field: log.repositoryName
        operator: filter_term
        value: '{{.log.repositoryName}}'
      - field: log.senderLogin
        operator: filter_term
        value: '{{.log.senderLogin}}'
    within: 24h
    count: 2
groupBy:
  - lastEvent.log.repositoryName
  - lastEvent.log.senderLogin
