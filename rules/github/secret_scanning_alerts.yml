# Rule version v1.0.0

dataTypes:
  - github
name: GitHub Secret Scanning Alert Detected
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1552: Unsecured Credentials"
adversary: origin
references:
  - https://docs.github.com/en/code-security/secret-scanning/about-secret-scanning
  - https://attack.mitre.org/techniques/T1552/
description: |
  Detects when GitHub's secret scanning feature identifies potential secrets, API keys, or credentials committed to a repository. This could indicate inadvertent exposure of sensitive information that could be exploited by attackers.
  
  Next Steps:
  1. Immediately review the alert details to identify the exposed secret type and location
  2. Rotate or revoke the exposed credential immediately
  3. Remove the secret from the repository history using git filter-branch or BFG Repo-Cleaner
  4. Audit access logs for any unauthorized use of the exposed credential
  5. Review commit history to identify who committed the secret
  6. Implement pre-commit hooks to prevent future secret exposures
  7. Enable push protection in GitHub to prevent secrets from being pushed
where: equals("log.action", "secret_scanning_alert.created") || equals("log.action", "secret_scanning.new_alert") || (equals("log.alert_type", "secret") && equals("log.state", "open"))
groupBy:
  - lastEvent.log.alert_number
  - lastEvent.log.repositoryName
