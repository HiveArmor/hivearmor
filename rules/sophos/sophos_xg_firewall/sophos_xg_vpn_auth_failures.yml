# Rule version v1.0.0

dataTypes:
  - firewall-sophos-xg
name: Sophos XG VPN Authentication Failures
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1110 - Brute Force"
adversary: origin
references:
  - https://docs.sophos.com/nsg/sophos-firewall/20.0/Help/en-us/webhelp/onlinehelp/AdministratorHelp/VPN/index.html
  - https://attack.mitre.org/techniques/T1110/
description: |
  Detects multiple VPN authentication failures on Sophos XG Firewall, indicating potential brute force attacks against SSL VPN or IPsec VPN services.

  Next Steps:
  1. Investigate the source IP and check geographic location
  2. Verify the targeted user account exists and is active
  3. Check for successful VPN connections from the same IP
  4. Consider blocking the source IP
  5. Enable MFA for VPN access
  6. Review VPN portal exposure settings
where: |
  (equals("log.component", "SSL VPN") || equals("log.component", "IPSec")) &&
  equals("log.type", "Event") &&
  (contains("log.message", ["authentication failed", "login failed", "invalid credentials", "auth failure"]) ||
   contains("log.subType", "Authentication"))  &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-sophos-xg-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
