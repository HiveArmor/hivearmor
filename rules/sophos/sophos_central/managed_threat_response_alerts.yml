# Rule version v1.0.0

dataTypes:
  - sophos-central
name: Managed Threat Response Critical Alert
impact:
  confidentiality: 3
  integrity: 3
  availability: 3
category: Threat Detection
technique: "T1562 - Impair Defenses"
adversary: origin
references:
  - https://docs.sophos.com/central/customer/help/en-us/ManageYourProducts/ThreatAnalysisCenter/index.html
  - https://attack.mitre.org/tactics/TA0005/
description: |
  Detects critical alerts from Sophos Managed Threat Response (MTR) service indicating active threats that require immediate investigation and response, including advanced persistent threats and sophisticated attack techniques.

  Next Steps:
  1. Review the MTR alert details in Sophos Central console
  2. Examine the affected endpoint for signs of compromise
  3. Check for lateral movement indicators on the network
  4. Verify if the threat has been successfully contained
  5. Update security policies based on threat intelligence from the alert
  6. Document the incident and response actions taken
where: |
  oneOf("log.type", ["mtr_alert", "threat_detection"]) &&
  oneOf("log.severity", ["critical", "high"])
afterEvents:
  - indexPattern: v11-log-sophos-central-*
    with:
      - field: log.endpointId
        operator: filter_term
        value: '{{.log.endpointId}}'
      - field: log.severity
        operator: filter_term
        value: 'critical'
    within: 1h
    count: 3
groupBy:
  - adversary.host
  - adversary.ip
