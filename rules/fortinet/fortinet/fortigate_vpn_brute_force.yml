# Rule version v1.0.0

dataTypes:
  - firewall-fortigate-traffic
name: FortiGate VPN Authentication Brute Force
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1133 - External Remote Services"
adversary: origin
references:
  - https://docs.fortinet.com/document/fortigate/7.4.1/fortios-log-message-reference/160372/list-of-log-types-and-subtypes
  - https://attack.mitre.org/techniques/T1133/
description: |
  Detects multiple SSL-VPN or IPsec VPN authentication failures from the same source IP on FortiGate, indicating brute force or credential stuffing attacks against remote access services.

  Next Steps:
  1. Investigate the source IP and check threat intelligence databases
  2. Review if the targeted user accounts exist and are active
  3. Check for any successful VPN connections following the failures
  4. Consider blocking the source IP or geo-restricting VPN access
  5. Enable MFA for VPN access if not already configured
  6. Check if the VPN portal is exposed to the internet unnecessarily
where: |
  equals("log.type", "event") &&
  (equals("log.subtype", "vpn") || contains("log.msg", "vpn")) &&
  (contains("log.msg", ["ssl-login-fail", "tunnel-down", "negotiation-error", "auth-fail"]) ||
   contains("log.logdesc", ["SSL VPN login fail", "IPsec phase1 negotiation failed", "VPN tunnel down"])) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-fortigate-traffic-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
