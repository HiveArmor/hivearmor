# Rule version v1.0.0

dataTypes:
  - firewall-fortiweb
name: FortiWeb SSRF Attack Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Web Application Attack
technique: "T1190 - Exploit Public-Facing Application"
adversary: origin
references:
  - https://docs.fortinet.com/document/fortiweb/7.4.3/administration-guide/210196/blocking-known-attacks
  - https://attack.mitre.org/techniques/T1190/
description: |
  Detects Server-Side Request Forgery (SSRF) attacks identified by FortiWeb. SSRF attacks force the server to make requests to internal resources, potentially accessing cloud metadata services, internal APIs, or other restricted endpoints.

  Next Steps:
  1. Review the SSRF payload to identify the target internal resource
  2. Check if cloud metadata endpoints (169.254.169.254) were targeted
  3. Verify the application is not vulnerable to SSRF
  4. Review application code for user-controlled URL parameters
  5. Implement URL allowlisting for server-side requests
  6. Check for any successful SSRF exploitation in application logs
where: |
  oneOf("action", ["deny", "block", "alert_deny", "alert"]) &&
  (regexMatch("log.msg", "(?i)(ssrf|server.*side.*request.*forg|169\\.254\\.169\\.254|metadata.*api|internal.*service|localhost|127\\.0\\.0\\.1.*redirect|0x7f000001|file:///|gopher://)") ||
   contains("log.attack_type", "ssrf") ||
   contains("log.signature", "SSRF"))
afterEvents:
  - indexPattern: v11-log-firewall-fortiweb-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 3
groupBy:
  - adversary.ip
  - target.ip
