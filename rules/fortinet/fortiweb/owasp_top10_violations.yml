# Rule version v1.0.0

dataTypes:
  - firewall-fortiweb
name: FortiWeb OWASP Top 10 Violation Attempts
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Initial Access
technique: "T1190 - Exploit Public-Facing Application"
adversary: origin
references:
  - https://docs.fortinet.com/document/fortiweb-cloud/23.3.0/user-guide/552829/known-attacks
  - https://owasp.org/www-project-top-ten/
  - https://attack.mitre.org/techniques/T1190/
description: |
  Detects attempts to exploit OWASP Top 10 vulnerabilities including injection flaws, broken authentication, sensitive data exposure, XXE, broken access control, security misconfiguration, and more. This rule triggers when FortiWeb blocks or alerts on attack attempts that match known OWASP Top 10 vulnerability patterns.

  Next Steps:
  1. Review the blocked request details in FortiWeb logs to understand the attack vector
  2. Check if the source IP has attempted multiple different attack types
  3. Verify if the targeted application has any known vulnerabilities
  4. Consider blocking the source IP if attacks persist
  5. Review application security headers and WAF rules for the targeted resource
  6. Check for any successful requests from the same source IP before the block
  7. Analyze the specific OWASP category and implement additional protections
  8. Review application code for the detected vulnerability type
where: |
  oneOf("action", ["deny", "alert_deny", "block", "blocked"]) &&
  regexMatch("log.msg", "(?i)(injection|traversal|xxe|xml external entity|broken auth|sensitive data|security misconfig|owasp|sqli|xss|csrf|command injection|path traversal|lfi|rfi|deserialization)")
afterEvents:
  - indexPattern: v11-log-firewall-fortiweb-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 5
groupBy:
  - adversary.ip
  - target.ip
