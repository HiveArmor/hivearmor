# Rule version v1.0.0

dataTypes:
  - firewall-fortiweb
name: FortiWeb SQL Injection Attack Detection
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Web Application Attack
technique: "T1190 - Exploit Public-Facing Application"
adversary: origin
references:
  - https://docs.fortinet.com/document/fortiweb/7.4.3/administration-guide/210196/blocking-known-attacks
  - https://attack.mitre.org/techniques/T1190/
description: |
  Detects SQL injection attacks identified by FortiWeb WAF signatures. Multiple SQLi attempts from the same source indicate a targeted attack against database-backed applications.

  Next Steps:
  1. Review the specific SQL injection payloads to assess severity
  2. Check if the target application is vulnerable to the attempted injection
  3. Verify the attack was blocked by FortiWeb
  4. Review application logs for any successful SQLi exploitation
  5. Investigate the source IP for additional attack patterns
  6. Update WAF signatures and consider implementing parameterized queries
where: |
  oneOf("action", ["deny", "block", "alert_deny", "alert"]) &&
  (regexMatch("log.msg", "(?i)(sql.*inject|union.*select|concat.*0x|xp_cmdshell|information_schema|benchmark.*sleep|extractvalue|updatexml|load_file|into.*outfile)") ||
   contains("log.attack_type", "sql_injection") ||
   contains("log.signature", "SQL Injection"))
afterEvents:
  - indexPattern: v11-log-firewall-fortiweb-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 5
groupBy:
  - adversary.ip
  - target.ip
