# Rule version v1.0.3

dataTypes:
  - "wineventlog"
name: "Windows: Remote File Download via Desktopimgdownldr Utility"
impact:
  confidentiality: 2
  integrity: 3
  availability: 1
category: "Command and Control"
technique: "T1105 - Ingress Tool Transfer"
adversary: origin
description: "Identifies the desktopimgdownldr utility being used to download a remote file. An adversary may use desktopimgdownldr to
              download arbitrary files as an alternative to certutil."
references:
  - "https://attack.mitre.org/tactics/TA0011/"
  - "https://attack.mitre.org/techniques/T1105/"
where: equals("log.eventCode", 4663) &&
       contains("log.eventDataProcessName", "desktopimgdownldr.exe") && !regexMatch("log.eventDataObjectName", "(:\\Windows\\Web\\|:\\ProgramData\\Microsoft\\Windows\\SystemData\\)") &&
       regexMatch("log.eventDataObjectName", "\\.(exe|dll|bat|ps1|zip|rar|7z)$")
groupBy:
  - origin.ip
  - target.user
