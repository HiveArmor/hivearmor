# Rule version v1.0.3
dataTypes:
  - wineventlog
name: "Windows: LSASS Memory Dump Handle Access"
impact:
  confidentiality: 2
  integrity: 3
  availability: 3
category: "Credential Access"
technique: "T1003.001 - OS Credential Dumping: LSASS Memory"
adversary: origin
description: "Identifies handle requests for the Local Security Authority Subsystem Service (LSASS) object access with
                specific access masks that many tools with a capability to dump memory to disk use (0x1fffff, 0x1010, 0x120089).
                This rule is tool agnostic as it has been validated against a host of various LSASS dump tools such as SharpDump,
                Procdump, Mimikatz, Comsvcs etc. It detects this behavior at a low level and does not depend on a specific tool or dump
                file name."
references:
  - "https://attack.mitre.org/tactics/TA0006/"
  - "https://attack.mitre.org/techniques/T1003/"
  - "https://attack.mitre.org/techniques/T1003/001/"
where: equals("log.eventCode", 4656) && regexMatch("log.eventDataObjectName", "(:\\Windows\\System32\\lsass.exe|\\Device\\HarddiskVolume[A-Za-z?:\\]([A-Za-z?])?\\Windows\\System32\\lsass.exe)") && !regexMatch("log.eventDataProcessName", "(:\\Program Files\\(.+).exe|:\\Program Files (x86)\\(.+).exe|:\\Windows\\system32\\wbem\\WmiPrvSE.exe|:\\Windows\\System32\\dllhost.exe|:\\Windows\\System32\\svchost.exe|:\\Windows\\System32\\msiexec.exe|:\\ProgramData\\Microsoft\\Windows Defender\\(.+).exe|:\\Windows\\explorer.exe)") &&
      oneOf("log.eventDataAccessMask", ["2097151", "4112", "1040", "1180185", "2031615"])
groupBy:
  - origin.ip
  - target.user
