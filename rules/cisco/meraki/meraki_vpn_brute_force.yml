# Rule version v1.0.0

dataTypes:
  - firewall-meraki
name: Meraki Client VPN Brute Force Attempts
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1110 - Brute Force"
adversary: origin
references:
  - https://documentation.meraki.com/MX/Client_VPN/Client_VPN_Overview
  - https://attack.mitre.org/techniques/T1110/
description: |
  Detects multiple failed client VPN authentication attempts from the same source IP on Meraki MX appliances, indicating potential brute force attacks against VPN credentials.

  Next Steps:
  1. Review the source IP address and check geographic location
  2. Verify if the targeted user account exists and is active
  3. Check for any successful VPN connections from the same IP
  4. Consider blocking the source IP at the MX appliance
  5. Review VPN authentication settings and ensure MFA is enabled
  6. Notify the targeted user if the account is legitimate
where: |
  (oneOf("log.eventType", ["vpn_auth_failure", "client_vpn_auth_failure"]) ||
   (contains("log.message", "VPN") && contains("log.message", ["auth fail", "authentication failed", "invalid credentials"]))) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-meraki-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
