# Rule version v1.0.0

dataTypes:
  - firewall-cisco-firepower
name: Command and Control on Non-Standard Ports
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Command and Control
technique: "T1571 - Non-Standard Port"
adversary: origin
references:
  - https://www.cisco.com/c/en/us/td/docs/security/secure-firewall/management-center/device-config/710/management-center-device-config-71/connection-log-fields.html
  - https://attack.mitre.org/techniques/T1571/
description: |
  Detects connections on non-standard ports that may indicate command and control (C2) communication. Identifies HTTP traffic on non-HTTP ports, encrypted traffic on unexpected ports, and application protocol mismatches detected by Firepower's application identification engine.

  Next Steps:
  1. Investigate the internal host initiating the suspicious connection
  2. Review the destination IP against threat intelligence feeds
  3. Analyze the application identification results for protocol anomalies
  4. Check if the destination port is commonly used for C2 frameworks
  5. Examine the connection duration and data transfer patterns
  6. Consider blocking the destination IP and scanning the internal host
where: |
  exists("log.appProto") &&
  exists("origin.ip") &&
  exists("target.ip") &&
  ((contains("log.appProto", "HTTP") && !oneOf("target.port", [80, 443, 8080, 8443, 8000, 8888])) ||
   (contains("log.appProto", "SSL") && !oneOf("target.port", [443, 8443, 993, 995, 465, 636])) ||
   equals("log.appProto", "unknown-tcp")) &&
  equals("log.initiatorPackets", true)
afterEvents:
  - indexPattern: v11-log-firewall-cisco-firepower-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: target.ip
        operator: filter_term
        value: '{{.target.ip}}'
    within: 1h
    count: 5
groupBy:
  - adversary.ip
  - target.ip
  - target.port
