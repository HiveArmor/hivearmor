# Rule version v1.0.0

dataTypes:
  - suricata
name: TLS Certificate Anomaly Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Defense Evasion
technique: "T1573 - Encrypted Channel"
adversary: origin
references:
  - https://suricata.readthedocs.io/en/latest/rules/tls-keywords.html
  - https://attack.mitre.org/techniques/T1573/
description: |
  Detects TLS certificate anomalies including self-signed certificates, expired certificates, certificate subject mismatches, and certificates from untrusted authorities. These anomalies are common indicators of C2 infrastructure, man-in-the-middle attacks, or phishing sites.

  Next Steps:
  1. Review the certificate details (issuer, subject, validity dates)
  2. Check if the destination is a legitimate service with a known certificate issue
  3. Investigate self-signed certificates connecting to external hosts
  4. Review the internal host for malware communicating with C2 servers
  5. Check if the certificate fingerprint matches known threat intelligence
  6. Block connections to destinations with suspicious certificates
where: |
  equals("log.eventType", "alert") &&
  (contains("log.alert.signature", ["self-signed", "expired certificate", "certificate mismatch", "untrusted CA", "invalid certificate"]) ||
   oneOf("log.alert.category", ["Not Suspicious Traffic", "Potential Corporate Privacy Violation"]) &&
   contains("log.alert.signature", "certificate")) &&
  exists("origin.ip") &&
  exists("target.ip")
afterEvents:
  - indexPattern: v11-log-suricata-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: target.ip
        operator: filter_term
        value: '{{.target.ip}}'
    within: 1h
    count: 10
groupBy:
  - adversary.ip
  - target.ip
