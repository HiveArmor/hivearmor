# Rule version v1.0.0

dataTypes:
  - suricata
name: PwnDrop File Hosting Server Access Detected
impact:
  confidentiality: 2
  integrity: 3
  availability: 1
category: Command and Control
technique: "T1102 - Web Service"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1102/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/web/proxy_generic/proxy_pwndrop.yml
  - https://github.com/kgretzky/pwndrop
description: |
  Detects HTTP access to PwnDrop file hosting servers. PwnDrop is a self-hosted file hosting tool designed for red teamers and attackers to serve payloads. The /pwndrop/ path in the URL is the default admin and API endpoint, and its presence in web traffic strongly indicates malicious file hosting or payload delivery.

  Next Steps:
  1. Identify what files were downloaded from the PwnDrop server
  2. Analyze any downloaded files for malicious content
  3. Block the PwnDrop server IP/domain at the network perimeter
  4. Check if the access was part of authorized red team activity
  5. Investigate the source host for signs of compromise
  6. Search for other hosts that connected to the same PwnDrop server
  7. Check email logs for phishing links pointing to the PwnDrop server
where: |
  equals("log.eventType", "http") &&
  exists("origin.ip") &&
  contains("log.http.url", "/pwndrop/")
groupBy:
  - adversary.ip
  - target.ip
