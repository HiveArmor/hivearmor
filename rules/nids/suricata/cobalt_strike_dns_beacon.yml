# Rule version v1.0.0

dataTypes:
  - suricata
name: Cobalt Strike DNS Beacon Pattern Detected
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Command and Control
technique: "T1071.004 - Application Layer Protocol: DNS"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1071/004/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/network/dns/net_dns_mal_cobaltstrike.yml
  - https://blog.sekoia.io/hunting-and-detecting-cobalt-strike/
description: |
  Detects DNS queries matching known Cobalt Strike DNS beacon patterns. Cobalt Strike uses specific DNS query prefixes for its DNS-based C2 channel, including 'aaa.stage.' for staging and 'post.1' for data exfiltration. These patterns are highly specific to Cobalt Strike and rarely appear in legitimate DNS traffic.

  Next Steps:
  1. Immediately isolate the source host generating these DNS queries
  2. Capture and analyze the full DNS query/response pairs for encoded C2 data
  3. Search for the Cobalt Strike beacon payload on the affected endpoint
  4. Check for lateral movement from the compromised system
  5. Block the identified C2 domains at the DNS resolver level
  6. Perform memory forensics on the endpoint to identify the beacon configuration
  7. Review network logs for additional C2 channels (HTTP/HTTPS beacons)
where: |
  equals("log.eventType", "dns") &&
  exists("log.dns.query") &&
  (
    regexMatch("log.dns.query", "(?i)^aaa\\.stage\\.") ||
    regexMatch("log.dns.query", "(?i)^post\\.1") ||
    (regexMatch("log.dns.query", "(?i)^cdn\\.") && regexMatch("log.dns.query", "(?i)\\.(stage|post)\\.")) ||
    (regexMatch("log.dns.query", "(?i)^api\\.") && regexMatch("log.dns.query", "(?i)\\.(stage|post)\\.")) ||
    (regexMatch("log.dns.query", "(?i)^www6\\.") && regexMatch("log.dns.query", "(?i)\\.(stage|post)\\."))
  ) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-suricata-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.eventType
        operator: filter_term
        value: 'dns'
    within: 15m
    count: 3
groupBy:
  - lastEvent.log.dns.query
  - adversary.ip
