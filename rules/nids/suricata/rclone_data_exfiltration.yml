# Rule version v1.0.0

dataTypes:
  - suricata
name: Rclone Data Exfiltration Tool Detected
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Exfiltration
technique: "T1567.002 - Exfiltration Over Web Service: Exfiltration to Cloud Storage"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1567/002/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/web/proxy_generic/proxy_ua_rclone.yml
  - https://research.nccgroup.com/2021/05/27/detecting-rclone-an-effective-tool-for-exfiltration/
description: |
  Detects HTTP traffic with the rclone user agent string. Rclone is a command-line program to manage files on cloud storage and is the most commonly used data exfiltration tool in ransomware operations. Threat groups including Conti, BlackMatter, LockBit, and many others use rclone to exfiltrate data before deploying ransomware.

  Next Steps:
  1. Immediately investigate the source host for signs of ransomware staging
  2. Determine what data is being transferred and to which cloud destination
  3. Check if rclone is an authorized tool in the environment
  4. Block the destination cloud storage endpoints if unauthorized
  5. Preserve network capture data for forensic analysis of exfiltrated data
  6. Search for ransomware deployment indicators on the same host
  7. Initiate incident response - this may indicate imminent ransomware deployment
where: |
  equals("log.eventType", "http") &&
  exists("log.http.http_user_agent") &&
  exists("origin.ip") &&
  (
    startsWith("log.http.http_user_agent", "rclone/") ||
    contains("log.http.http_user_agent", "rclone/v")
  )
afterEvents:
  - indexPattern: v11-log-suricata-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.eventType
        operator: filter_term
        value: 'http'
    within: 30m
    count: 3
groupBy:
  - adversary.ip
  - target.ip
