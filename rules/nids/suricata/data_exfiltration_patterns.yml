# Rule version v1.0.0

dataTypes:
  - suricata
name: Data Exfiltration Pattern Detection
impact:
  confidentiality: 3
  integrity: 1
  availability: 1
category: Exfiltration
technique: "T1048 - Exfiltration Over Alternative Protocol"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1048/
  - https://attack.mitre.org/techniques/T1041/
  - https://www.snort.org/rule_docs/
description: |
  Detects potential data exfiltration activities through unusual outbound traffic patterns, large data transfers, suspicious protocols, base64 encoded data, and connections to external file sharing services. This rule identifies various indicators of data theft including large uploads, connections to file sharing services, DNS tunneling, and TOR usage.
  
  Next Steps:
  1. Investigate the source host for signs of compromise or unauthorized access
  2. Review network logs to identify the exact data being transferred
  3. Check if the destination is a known legitimate service or suspicious domain
  4. Examine user activity on the source system for unauthorized data access
  5. Review file access logs and recently modified sensitive files
  6. Analyze DNS queries for potential data tunneling patterns
  7. Check for presence of data collection tools or scripts on the affected system
  8. Verify if the large data transfer was authorized by business processes
  9. Consider implementing additional monitoring on the affected host
  10. If confirmed malicious, isolate the affected system and begin incident response procedures
where: |
  (contains("log.alert.signature", ["exfiltration", "data theft", "suspicious upload"]) ||
   oneOf("log.alert.category", ["policy-violation", "data-loss"]) ||
   (greaterThan("log.flow.bytes_toserver", 10485760) && oneOf("target.port", [443, 22, 53, 8080])) ||
   (equals("log.http.method", "POST") && greaterThan("log.http.length", 5242880)) ||
   contains("log.dns.query", ".pastebin.") || contains("log.dns.query", ".wetransfer.") || contains("log.dns.query", ".mediafire.") ||
   (equals("log.protocol", "DNS") && greaterThan("log.dns.query_length", 200)) ||
   contains("log.tls.sni", ["tor2web", ".onion"])) &&
  exists("origin.ip") &&
  exists("target.ip") &&
  equals("log.direction", "outbound")
afterEvents:
  - indexPattern: v11-log-suricata-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 30m
    count: 10
groupBy:
  - adversary.ip
  - target.ip
