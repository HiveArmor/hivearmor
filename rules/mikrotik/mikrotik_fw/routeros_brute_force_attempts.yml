# Rule version v1.0.0

dataTypes:
  - firewall-mikrotik
name: RouterOS Multiple Authentication Failures
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Credential Access
technique: "T1110.001 - Brute Force: Password Guessing"
adversary: origin
references:
  - https://help.mikrotik.com/docs/spaces/ROS/pages/328094/Log
  - https://attack.mitre.org/techniques/T1110/001/
description: |
  Detects multiple failed authentication attempts to RouterOS from the same source IP, which may indicate a brute force attack against the device. This rule monitors for login failures across all services including SSH, Telnet, Winbox, and web interface.

  Next Steps:
  1. Investigate the source IP address for legitimacy and geographic location
  2. Check if the IP is from an expected network range or known administrator location
  3. Review successful authentication attempts from the same IP before and after the failures
  4. Examine other RouterOS logs for additional suspicious activities from this IP
  5. Consider implementing IP blocking or rate limiting for the source IP
  6. Verify RouterOS user accounts for any unauthorized changes or access
  7. Check if default credentials are still in use on the device
where: contains("log.topics", "system") && contains("log.topics", "error") && contains("log.topics", "critical") && contains("log.message", "login failure") && exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-mikrotik-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.message
        operator: filter_match
        value: 'login failure'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
