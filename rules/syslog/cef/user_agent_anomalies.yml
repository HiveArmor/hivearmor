# Rule version v1.0.0

dataTypes:
  - syslog
name: CEF User Agent Anomaly Detection
impact:
  confidentiality: 2
  integrity: 2
  availability: 1
category: Command and Control
technique: "T1071.001 - Application Layer Protocol: Web Protocols"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://learn.microsoft.com/en-us/azure/sentinel/cef-name-mapping
description: |
  Detects anomalous user agent strings in CEF logs that may indicate malicious scripts, bots, vulnerability scanners, or attempts to bypass security controls through user agent spoofing. This rule identifies known attack tools, template injection attempts, and unusually short or long user agent strings.
  
  Next Steps:
  1. Investigate the source IP address for additional suspicious activities
  2. Review the specific URLs and resources accessed by this user agent
  3. Check for other security events from the same IP address in recent timeframes
  4. Analyze the request patterns to determine if automated scanning is occurring
  5. Consider blocking the source IP if confirmed malicious
  6. Review web application logs for potential exploitation attempts
  7. Validate if the user agent represents legitimate automation tools
where: |
  equals("log.dataType", "cef") && 
  exists("log.requestClientApplication") &&
  (
    regexMatch("log.requestClientApplication", "(?i)sqlmap") ||
    regexMatch("log.requestClientApplication", "(?i)nikto") ||
    regexMatch("log.requestClientApplication", "(?i)havij") ||
    regexMatch("log.requestClientApplication", "(?i)acunetix") ||
    regexMatch("log.requestClientApplication", "(?i)nessus") ||
    regexMatch("log.requestClientApplication", "(?i)metasploit") ||
    contains("log.requestClientApplication", "${") ||
    contains("log.requestClientApplication", "{{")
  )
afterEvents:
  - indexPattern: v11-log-syslog-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 1h
    count: 10
groupBy:
  - lastEvent.log.requestClientApplication
  - adversary.ip
