# Rule version v1.0.0

dataTypes:
  - macos
name: Endpoint Security Framework Bypass Attempt
impact:
  confidentiality: 3
  integrity: 3
  availability: 3
category: Defense Evasion
technique: "T1562.001 - Impair Defenses: Disable or Modify Tools"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://developer.apple.com/documentation/endpointsecurity
description: |
  Detects attempts to bypass or tamper with the macOS Endpoint Security framework, which could indicate malicious activity trying to evade security monitoring. The Endpoint Security framework is a critical component for system security monitoring and its compromise can allow attackers to operate undetected.
  
  Next Steps:
  1. Investigate the affected system and identify the process attempting to bypass endpoint security
  2. Check for suspicious process executions or file modifications around the time of the alert
  3. Verify if any legitimate security tools were recently installed or updated
  4. Review system logs for other indicators of compromise
  5. Consider isolating the affected system if malicious activity is confirmed
  6. Check for persistence mechanisms that might be attempting to disable security controls
where: |
  (equals("log.subsystem", "com.apple.endpointsecurity") ||
   contains("log.process", "EndpointSecurity") ||
   contains("log.message", "ES_EVENT_TYPE")) &&
  (contains("log.message", "bypass") ||
   contains("log.message", "failed authorization") ||
   contains("log.message", "client disconnected") ||
   contains("log.message", "authorization denied") ||
   contains("log.message", "invalid client") ||
   contains("log.message", "ES_RETURN_ERROR") ||
   equals("log.eventType", "error") ||
   contains("log.message", "memory leak detected"))
afterEvents:
  - indexPattern: v11-log-macos-*
    with:
      - field: system.hostname
        operator: filter_term
        value: '{{.system.hostname}}'
    within: 15m
    count: 2
groupBy:
  - lastEvent.log.process
  - lastEvent.system.hostname
