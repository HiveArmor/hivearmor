# Rule version v1.0.0

dataTypes:
  - macos
name: Keychain Credential Dumping Detected
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1555.001 - Credentials from Password Stores: Keychain"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1555/001/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/macos/process_creation/proc_creation_macos_creds_from_keychain.yml
description: |
  Detects the use of the macOS security command-line tool to extract credentials from the Keychain. Commands like "security find-certificate", "security export", and "security dump-keychain" are used by attackers to harvest stored certificates, passwords, and private keys from the macOS Keychain.

  Next Steps:
  1. Identify the user and process that executed the security command
  2. Determine which keychain items were accessed or exported
  3. Check if credentials were exfiltrated to an external location
  4. Reset any credentials that may have been compromised
  5. Review the process tree for the parent process and execution context
  6. Check for lateral movement using any harvested credentials
where: |
  (equals("log.process", "security") || contains("log.eventMessage", "/usr/bin/security")) &&
  (
    contains("log.eventMessage", "find-certificate") ||
    contains("log.eventMessage", "dump-keychain") ||
    contains("log.eventMessage", "export -t") ||
    contains("log.eventMessage", "find-generic-password") ||
    contains("log.eventMessage", "find-internet-password")
  )
groupBy:
  - adversary.host
  - adversary.user
