# Rule version v1.0.0

dataTypes:
  - deceptive-bytes
name: Data Theft Attempt on Decoy Files
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Collection
technique: "T1005 - Data from Local System"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1005/
  - https://attack.mitre.org/techniques/T1567/
  - https://deceptivebytes.com/solution/
description: |
  Detects attempts to access, copy, or exfiltrate deceptive decoy files and honeypot data, indicating potential data theft activities by an attacker. This rule triggers when an attacker interacts with high-sensitivity decoy files planted by Deceptive Bytes.
  
  Next Steps:
  - Immediately isolate the affected endpoint to prevent lateral movement
  - Review the source IP and user account for suspicious activity patterns
  - Check for other decoy interactions from the same source in the past 24 hours
  - Examine network traffic logs for potential data exfiltration attempts
  - Verify if the user account has been compromised or if this is insider threat activity
  - Consider resetting credentials for the affected user account
  - Document all decoy files accessed for forensic analysis
where: |
  equals("log.event_type", "decoy_accessed") &&
  oneOf("log.action", ["file_read", "file_copy", "file_download"]) &&
  equals("log.decoy_sensitivity", "high")
afterEvents:
  - indexPattern: v11-log-deceptive-bytes-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.event_type
        operator: filter_term
        value: 'decoy_accessed'
    within: 2h
    count: 3
groupBy:
  - lastEvent.log.decoy_file
  - adversary.ip
  - adversary.user
