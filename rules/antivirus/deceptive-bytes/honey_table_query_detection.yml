# Rule version v1.0.0

dataTypes:
  - deceptive-bytes
name: Honey Table Query Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Collection
technique: "T1005 - Data from Local System"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1005/
  - https://deceptivebytes.com/solution/
description: |
  Detects when an attacker queries honey tables or decoy database objects deployed by Deceptive Bytes. This indicates potential data exfiltration attempts or database reconnaissance. Honey tables are deliberately placed decoy data designed to attract and identify unauthorized access attempts.
  
  Next Steps:
  1. Identify the source IP and determine if it's an internal or external address
  2. Check if the source IP has accessed other decoy resources or legitimate database tables
  3. Review the specific honey table(s) that were queried to understand attacker interest
  4. Correlate with authentication logs to identify the user account used
  5. Check for any data exfiltration patterns following the honey table access
  6. Isolate the compromised system or account if malicious activity is confirmed
  7. Review database access logs for unauthorized queries to legitimate tables
  8. Consider blocking the source IP if it's external and confirmed malicious
  9. Document the incident and update security monitoring rules if needed
where: equals("log.eventType", "decoy_access") && equals("log.resourceType", "database_table") && equals("log.action", "query") && exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-deceptive-bytes-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.eventType
        operator: filter_term
        value: decoy_access
    within: 1h
    count: 5
groupBy:
  - lastEvent.log.tableName
  - adversary.ip
