# Rule version v1.0.0

dataTypes:
  - netflow
name: Cryptocurrency Mining Pool Traffic Detection
impact:
  confidentiality: 1
  integrity: 2
  availability: 3
category: Resource Hijacking
technique: "T1496 - Resource Hijacking"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1496/
  - https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html
description: |
  Detects network connections to known cryptocurrency mining pool ports (Stratum protocol on 3333, 4444, 5555, 7777, 8888, 9999, 14444). Internal hosts connecting to mining pools indicate cryptojacking or unauthorized mining activity.

  Next Steps:
  1. Identify the internal host connecting to mining pools
  2. Scan the host for mining malware (XMRig, CGMiner, etc.)
  3. Review CPU/GPU utilization on the affected host
  4. Check how the mining software was installed (vulnerability, phishing, insider)
  5. Remove the mining software and patch the entry vector
  6. Block mining pool ports at the network perimeter
where: |
  exists("origin.ip") &&
  exists("target.ip") &&
  oneOf("target.port", [3333, 4444, 5555, 7777, 8888, 9999, 14444, 14433, 45560]) &&
  equals("protocol", "TCP") &&
  !inCIDR("target.ip", "10.0.0.0/8") &&
  !inCIDR("target.ip", "172.16.0.0/12") &&
  !inCIDR("target.ip", "192.168.0.0/16")
afterEvents:
  - indexPattern: v11-log-netflow-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 30m
    count: 5
groupBy:
  - adversary.ip
  - target.ip
