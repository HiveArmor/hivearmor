# Rule version v1.0.0

dataTypes:
  - netflow
name: DDoS Attack Pattern Detection
impact:
  confidentiality: 1
  integrity: 1
  availability: 3
category: Impact
technique: "T1498 - Network Denial of Service"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1498/
  - https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html
description: |
  Detects potential DDoS attack patterns based on high volume of network flows from multiple sources targeting a single destination within a short time window. This rule identifies suspicious traffic volumes that may indicate volumetric DDoS attacks such as UDP floods, TCP floods, or other amplification attacks.

  Next Steps:
  1. Verify the target IP address and check if it's a critical service or server
  2. Analyze the source IPs to determine if they are part of a botnet or coordinated attack
  3. Review network traffic patterns and bandwidth utilization during the timeframe
  4. Check firewall and DDoS mitigation system logs for related events
  5. Implement rate limiting or blocking rules for attacking source IPs if confirmed malicious
  6. Consider scaling up infrastructure or activating DDoS protection services if attack is ongoing
  7. Document the attack pattern for future reference and threat intelligence
where: exists("target.ip") && exists("origin.ip") && (greaterThan("origin.bytesSent", 10000000) || greaterThan("origin.packagesSent", 50000))
afterEvents:
  - indexPattern: v11-log-netflow-*
    with:
      - field: target.ip
        operator: filter_term
        value: '{{.target.ip}}'
      - field: dataType
        operator: filter_term
        value: netflow
    within: 5m
    count: 100
groupBy:
  - target.ip
