# Rule version v1.0.0

dataTypes:
  - netflow
name: Data Exfiltration Detection
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Exfiltration
technique: "T1041 - Exfiltration Over C2 Channel"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html
description: |
  Detects potential data exfiltration based on unusually large outbound data transfers to external IP addresses. This rule identifies network flows where significant amounts of data (>10MB) are transferred from internal systems to external destinations in different countries, potentially indicating unauthorized data theft or exfiltration attempts.
  
  Next Steps:
  1. Verify the legitimacy of the large data transfer by checking if it corresponds to authorized business activities
  2. Investigate the destination IP address for reputation and known threat indicators
  3. Review the user and process responsible for initiating the connection
  4. Check for any recently accessed sensitive files or databases on the source system
  5. Examine network logs for any additional suspicious communications to the same destination
  6. Consider implementing DLP policies if large data transfers to external destinations are not business justified
  7. If confirmed malicious, isolate the affected system and conduct a full forensic investigation
where: exists("origin.ip") && exists("target.ip") && greaterThan("origin.bytesSent", 10000000) && safe(origin.geolocation.country, "") != safe(target.geolocation.country, "") && greaterThan("origin.port", 1024)
afterEvents:
  - indexPattern: v11-log-netflow-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: dataType
        operator: filter_term
        value: netflow
    within: 1h
    count: 10
groupBy:
  - adversary.ip
  - target.ip
