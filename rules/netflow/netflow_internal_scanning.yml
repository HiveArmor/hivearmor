# Rule version v1.0.0

dataTypes:
  - netflow
name: Internal Network Host Scanning Detection
impact:
  confidentiality: 2
  integrity: 1
  availability: 1
category: Discovery
technique: "T1046 - Network Service Scanning"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1046/
  - https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html
description: |
  Detects east-west network scanning where an internal host connects to many other internal hosts on the same or multiple ports, indicating internal reconnaissance or worm propagation.

  Next Steps:
  1. Identify the source host and determine if it is a legitimate scanner
  2. Check if the scanning host shows signs of compromise
  3. Review the ports being scanned for service enumeration patterns
  4. Investigate the user account associated with the host
  5. Verify if any vulnerability scanning tools are scheduled to run
  6. If unauthorized, isolate the host and perform forensic analysis
where: |
  exists("origin.ip") &&
  exists("target.ip") &&
  (inCIDR("origin.ip", "10.0.0.0/8") || inCIDR("origin.ip", "172.16.0.0/12") || inCIDR("origin.ip", "192.168.0.0/16")) &&
  (inCIDR("target.ip", "10.0.0.0/8") || inCIDR("target.ip", "172.16.0.0/12") || inCIDR("target.ip", "192.168.0.0/16")) &&
  lessOrEqual("log.packets", 5) &&
  lessThan("log.bytes", 500)
afterEvents:
  - indexPattern: v11-log-netflow-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 5m
    count: 30
deduplicateBy:
  - adversary.ip
