# Rule version v1.0.0

dataTypes:
  - netflow
name: VPN Protocol to Non-Corporate Destination
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Exfiltration
technique: "T1572 - Protocol Tunneling"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1572/
  - https://www.cisco.com/en/US/technologies/tk648/tk362/technologies_white_paper09186a00800a3db9.html
description: |
  Detects VPN protocol traffic (OpenVPN, WireGuard, IPsec) from internal hosts to non-corporate external destinations. This may indicate data exfiltration through unauthorized VPN tunnels or policy-violating VPN usage.

  Next Steps:
  1. Identify the internal host establishing unauthorized VPN connections
  2. Verify if the destination is a legitimate corporate VPN endpoint
  3. Review the user and application initiating the VPN tunnel
  4. Check the volume of data transferred through the tunnel
  5. Investigate if any sensitive data may have been exfiltrated
  6. Block unauthorized VPN ports at the perimeter if not needed
where: |
  exists("origin.ip") &&
  exists("target.ip") &&
  oneOf("target.port", [1194, 51820, 500, 4500, 1701, 1723]) &&
  !inCIDR("target.ip", "10.0.0.0/8") &&
  !inCIDR("target.ip", "172.16.0.0/12") &&
  !inCIDR("target.ip", "192.168.0.0/16")
afterEvents:
  - indexPattern: v11-log-netflow-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: target.port
        operator: filter_term
        value: '{{.target.port}}'
    within: 1h
    count: 3
groupBy:
  - adversary.ip
  - target.ip
  - target.port
