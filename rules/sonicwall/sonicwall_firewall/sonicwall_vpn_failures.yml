# Rule version v1.0.0

dataTypes:
  - firewall-sonicwall
name: SonicWall SSL VPN Authentication Failures
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Credential Access
technique: "T1133 - External Remote Services"
adversary: origin
references:
  - https://www.sonicwall.com/techdocs/pdf/sonicos-6-5-4-log-events-reference-guide.pdf
  - https://attack.mitre.org/techniques/T1133/
description: |
  Detects multiple SSL VPN authentication failures from the same source IP on SonicWall firewalls, indicating brute force or credential stuffing attacks against remote access services.

  Next Steps:
  1. Investigate the source IP and check threat intelligence databases
  2. Verify if the targeted user accounts exist and are active
  3. Check for successful VPN connections from the same IP
  4. Consider geo-restricting VPN access
  5. Enable MFA for VPN access if not already configured
  6. Block the source IP if confirmed malicious
where: |
  ((contains("log.message", ["VPN", "SSL-VPN", "NetExtender"]) &&
    contains("log.message", ["fail", "denied", "invalid", "rejected"])) ||
   contains("log.eventName", ["VPN login failed", "SSL VPN authentication failed"]) ||
   contains("log.category", "VPN Access")) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-sonicwall-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
