# Rule version v1.0.0

dataTypes:
  - firewall-paloalto
name: PAN-OS Management Plane Login Brute Force
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Credential Access
technique: "T1110 - Brute Force"
adversary: origin
references:
  - https://docs.paloaltonetworks.com/pan-os/10-2/pan-os-admin/monitoring/use-syslog-for-monitoring/syslog-field-descriptions/system-log-fields
  - https://attack.mitre.org/techniques/T1110/
description: |
  Detects multiple failed login attempts to the PAN-OS management plane (web UI, SSH, or API), indicating potential brute force attacks against firewall administrative credentials.

  Next Steps:
  1. Investigate the source IP attempting management authentication
  2. Verify if the targeted admin account exists and is active
  3. Check for any successful logins from the same source after failures
  4. Consider restricting management access by IP address
  5. Enable account lockout policies if not already configured
  6. Review management interface exposure and restrict to trusted networks
where: |
  equals("log.pa_type", "SYSTEM") &&
  (contains("log.message", ["auth", "login"]) && contains("log.message", ["fail", "invalid", "denied"])) &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-firewall-paloalto-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.pa_type
        operator: filter_term
        value: 'SYSTEM'
    within: 15m
    count: 10
groupBy:
  - adversary.ip
  - adversary.user
