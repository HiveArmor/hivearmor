# Rule version v1.0.0

dataTypes:
  - linux
name: YUM/DNF Repository Manipulation Attack
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Initial Access
technique: "T1195.001 - Supply Chain Compromise: Compromise Software Dependencies and Development Tools"
adversary: origin
references:
  - https://attack.mitre.org/techniques/T1195/001/
  - https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/9/html-single/managing_software_with_the_dnf_tool/index
description: |
  Detects potential attacks on YUM/DNF repositories including unauthorized repository additions, GPG key modifications, or suspicious package installations that could indicate supply chain compromise. This rule identifies attempts to manipulate package management systems to install malicious software or bypass security controls.

  **Next Steps:**
  1. **Immediate Response**: Isolate the affected system to prevent further compromise
  2. **Investigate Repository Changes**: Review all recent repository configuration changes and verify legitimacy
  3. **Package Verification**: Check all recently installed packages for authenticity and integrity
  4. **GPG Key Analysis**: Verify all GPG keys and remove any unauthorized or suspicious keys
  5. **System Integrity**: Perform full system integrity checks using tools like AIDE or Tripwire
  6. **Network Analysis**: Monitor network traffic for suspicious download sources
  7. **User Activity**: Review user activities and access logs for the timeframe of the incident
  8. **Rollback Planning**: Prepare to rollback unauthorized changes and remove malicious packages
  9. **Policy Review**: Strengthen package management policies and access controls
  10. **Documentation**: Document all findings and remediation steps for incident response records
where: |
  (
    oneOf("log.comm", ["yum", "dnf", "rpm"]) &&
    oneOf("log.exe", ["/usr/bin/yum", "/usr/bin/dnf", "/usr/bin/rpm"]) &&
    (
      (contains("log.path", ".repo") && oneOf("log.syscall", ["2", "257"])) ||
      (contains("log.path", "gpgkey") && equals("log.operation", "write")) ||
      (contains("log.args", "install") && contains("log.args", "--nogpgcheck")) ||
      (contains("log.message", "Repository") && contains("log.message", "added")) ||
      (contains("log.message", "GPG key") && contains("log.message", "imported"))
    )
  ) ||
  (
    equals("log.eventType", "PACKAGE_INSTALLED") &&
    (
      equals("log.package_source", "unknown") ||
      equals("log.gpg_verification", "failed") ||
      !oneOf("log.repository", ["rhel-8-baseos-rpms", "rhel-8-appstream-rpms", "rhel-9-baseos-rpms", "rhel-9-appstream-rpms"])
    )
  )
groupBy:
  - lastEvent.log.comm
  - origin.host
