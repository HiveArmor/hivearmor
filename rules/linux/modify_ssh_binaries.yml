# Rule version v1.0.0

dataTypes:
  - linux
name: "System Linux: Modification of OpenSSH Binaries"
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: "Persistence"
technique: "T1543 - Create or Modify System Process"
adversary: origin
description: "Adversaries may modify SSH related binaries for persistence or credential access by patching sensitive functions to
              enable unauthorized access or by logging SSH credentials for exfiltration."
references:
  - "https://attack.mitre.org/tactics/TA0003/"
  - "https://attack.mitre.org/techniques/T1543/"
where: regexMatch("log.message", "libkeyutils.so") && !regexMatch("log.message", "(dpkg|yum|dnf|dnf-automatic)") && regexMatch("log.message", "(/usr/sbin/sshd|/usr/bin/ssh|/usr/bin/sftp|/usr/bin/scp)")
groupBy:
  - origin.ip
  - origin.user
