# Rule version v1.0.0

dataTypes:
  - linux
name: "System Linux: System Log File Deletion"
impact:
  confidentiality: 3
  integrity: 3
  availability: 3
category: "Defense Evasion"
technique: "T1070.002 - Indicator Removal"
adversary: origin
description: "Identifies the deletion of sensitive Linux system logs. This may indicate an attempt to evade detection or destroy
              forensic evidence on a system."
references:
  - "https://attack.mitre.org/tactics/TA0005/"
  - "https://attack.mitre.org/techniques/T1070/002/"
where: regexMatch("log.message", "(/var/run/utmp|/var/log/wtmp|/var/log/btmp|/var/log/lastlog|/var/log/faillog|/var/log/syslog|/var/log/messages|/var/log/secure|/var/log/auth.log|/var/log/boot.log|/var/log/kern.log)") && !contains("log.message", "gzip") && regexMatch("log.message", "(rm |shred -u)")
groupBy:
  - origin.ip
  - origin.user
