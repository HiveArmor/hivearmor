# Rule version v1.0.0

dataTypes:
  - firewall-pfsense
name: pfSense Snort/Suricata IDS Alerts
impact:
  confidentiality: 2
  integrity: 2
  availability: 2
category: Execution
technique: "T1059 - Command and Scripting Interpreter"
adversary: origin
references:
  - https://docs.netgate.com/pfsense/en/latest/packages/snort/alerts.html
  - https://docs.netgate.com/pfsense/en/latest/packages/snort/index.html
  - https://attack.mitre.org/techniques/T1059/
description: |
  Detects high-priority IDS alerts from Snort or Suricata indicating malicious activity, exploits, or known attack patterns. These alerts typically indicate active threats such as trojans, exploits, malware, backdoors, shellcode, rootkits, or various attack attempts including scans, intrusions, and compromises.

  Next Steps:
  1. Immediately investigate the source IP address and verify if it's a legitimate system
  2. Review the full alert details and classification to understand the specific threat detected
  3. Check network logs for additional suspicious activity from the same source
  4. Examine the target system for signs of compromise or successful exploitation
  5. Consider blocking the source IP if confirmed malicious
  6. Update IDS signatures and review firewall rules to prevent similar attacks
  7. Correlate with threat intelligence feeds to identify known malicious indicators
where: |
  regexMatch("log.eventType", "(?i)(snort|suricata)") &&
  regexMatch("log.raw", "(?i)(priority\\s*:\\s*1|classification\\s*:\\s*(trojan|exploit|malware|backdoor|shellcode|rootkit))")
afterEvents:
  - indexPattern: v11-log-firewall-pfsense-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 15m
    count: 3
groupBy:
  - lastEvent.log.eventType
  - adversary.ip
