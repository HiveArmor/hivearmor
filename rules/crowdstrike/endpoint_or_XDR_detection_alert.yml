name: "Endpoint or XDR Detection Alert"
description: "A critical detection summary has been generated from Falcon EPP or XDR indicating malicious activity or attack patterns."
category: "Threat Detection"
technique: "Command and Scripting Interpreter"
references:
  - "https://attack.mitre.org/techniques/T1059/"
dataTypes:
  - crowdstrike
adversary: origin
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
where: >
  exists("log.metadataEventType") && 
  oneOf("log.metadataEventType", ["EppDetectionSummaryEvent", "XdrDetectionSummaryEvent"])
groupBy:
  - lastEvent.log.metadataEventType