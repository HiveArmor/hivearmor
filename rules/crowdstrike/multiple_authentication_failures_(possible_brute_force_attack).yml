name: "Multiple Authentication Failures (Possible Brute Force Attack)"
description: "A user or IP address has failed multiple authentication attempts on the CrowdStrike Falcon console within a short period of time."
category: "Credential Access"
technique: "Brute Force: Password Guessing"
references:
  - "https://attack.mitre.org/techniques/T1110/001/"
dataTypes:
  - crowdstrike
adversary: origin
impact:
  confidentiality: 3
  integrity: 0
  availability: 0
where: >
  equals("log.metadataEventType", "AuthActivityAuditEvent") && 
  equals("log.eventSuccess", false) && 
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-crowdstrike-*
    within: 15m
    count: 5
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
      - field: log.eventSuccess
        operator: filter_term
        value: 'false'
deduplicateBy:
  - origin.ip