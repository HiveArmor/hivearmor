name: "Deletion or Deactivation of User Account"
description: "An administrator has deactivated or deleted a user account in the Falcon console. This indicates account manipulation."
category: "Account Manipulation"
technique: "Account Manipulation"
references:
  - "https://attack.mitre.org/techniques/T1098/"
dataTypes:
  - crowdstrike
adversary: origin
impact:
  confidentiality: 0
  integrity: 3
  availability: 3
where: >
  exists("log.eventOperationName") && 
  oneOf("log.eventOperationName", ["deactivateUser", "deleteUser"])
groupBy:
  - lastEvent.log.eventUserId
  - lastEvent.log.eventOperationName