name: "OS Credential Dumping Activity"
description: "The endpoint agent detected activity commonly associated with OS Credential Dumping. This includes attempts to read or dump LSASS memory using known tools."
category: "Credential Access"
technique: "OS Credential Dumping: LSASS Memory"
references:
  - "https://attack.mitre.org/techniques/T1003/001/"
dataTypes:
  - crowdstrike
adversary: origin
impact:
  confidentiality: 3
  integrity: 1
  availability: 0
where: >
    equals("log.event_simpleName", "ProcessRollup2") && 
    exists("log.eventCommandLine") && 
    regexMatch("log.eventCommandLine", "(?i).*(procdump.*lsass|mimikatz|sekurlsa|lsass\\.dmp).*")
groupBy: 
  - origin.host
  - origin.user