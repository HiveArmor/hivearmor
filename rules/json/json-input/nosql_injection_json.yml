# Rule version v1.0.0

dataTypes:
  - json-input
name: NoSQL Injection via JSON Detection
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Injection Attack
technique: "T1190 - Exploit Public-Facing Application"
adversary: origin
references:
  - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection
  - https://attack.mitre.org/techniques/T1190/
description: |
  Detects MongoDB-style NoSQL injection patterns in JSON payloads including $gt, $ne, $regex, $where, and other operator-based injection techniques. These attacks bypass authentication or extract data from NoSQL databases.

  Next Steps:
  1. Review the JSON payload for NoSQL injection operators
  2. Identify the application endpoint processing the malicious input
  3. Check if the injection was successful (data access or bypass)
  4. Implement input validation to reject MongoDB operators in user input
  5. Use parameterized queries for database operations
  6. Block the source IP if confirmed malicious
where: |
  exists("origin.ip") &&
  (
    (contains("raw", "$where") && contains("raw", "function")) ||
    (contains("raw", "$gt") && contains("raw", "password")) ||
    (contains("raw", "$ne") && contains("raw", "password")) ||
    (contains("raw", "$regex") && contains("raw", "password")) ||
    (contains("raw", "$gt") && contains("raw", "username")) ||
    (contains("raw", "$ne") && contains("raw", "username")) ||
    contains("raw", "this.password") ||
    contains("raw", "this.username") ||
    (contains("raw", "$unionWith") && contains("raw", "admin"))
  )
afterEvents:
  - indexPattern: v11-log-json-input-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 10m
    count: 3
groupBy:
  - adversary.ip
  - target.host
