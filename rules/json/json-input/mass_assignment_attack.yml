# Rule version v1.0.0

dataTypes:
  - json-input
name: Mass Assignment Attack Detection
impact:
  confidentiality: 2
  integrity: 3
  availability: 1
category: Data Manipulation
technique: "T1565 - Data Manipulation"
adversary: origin
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html
  - https://attack.mitre.org/techniques/T1565/
description: |
  Detects mass assignment attacks where unexpected fields like isAdmin, role, permissions, or password are injected in JSON request bodies. Attackers exploit API endpoints that blindly bind user input to object properties.

  Next Steps:
  1. Review the JSON payload for unauthorized field injection
  2. Check if the mass assignment was successful (privilege escalation)
  3. Verify the application uses field allowlisting for binding
  4. Implement strict input validation and DTO patterns
  5. Review API endpoint security for over-binding vulnerabilities
  6. Check for any account modifications resulting from the attack
where: |
  exists("origin.ip") &&
  (
    (contains("raw", "\"isAdmin\"") && contains("raw", "true")) ||
    (contains("raw", "\"is_admin\"") && contains("raw", "true")) ||
    (contains("raw", "\"permissions\"") && contains("raw", "\"*\"")) ||
    (contains("raw", "\"password\"") && contains("raw", "\"resetToken\"")) ||
    contains("raw", "\"__proto__\"")
  )
afterEvents:
  - indexPattern: v11-log-json-input-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 10m
    count: 3
groupBy:
  - adversary.ip
  - target.host
