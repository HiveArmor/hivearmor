# Rule version v1.0.0

dataTypes:
  - json-input
name: Unsafe Deserialization Attack Detected
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Initial Access
technique: "T1190 - Exploit Public-Facing Application"
adversary: origin
references:
  - https://knowledge-base.secureflag.com/vulnerabilities/unsafe_deserialization/unsafe_deserialization_java.html
  - https://attack.mitre.org/techniques/T1190/
description: |
  Detects attempts to exploit unsafe deserialization vulnerabilities through malicious JSON payloads containing serialized objects or code execution patterns. These attacks can lead to remote code execution, privilege escalation, or data compromise.
  
  Next Steps:
  1. Analyze the JSON payload structure and identify malicious patterns
  2. Check application logs for evidence of successful exploitation
  3. Review the target application's deserialization implementation
  4. Implement input validation and use safe deserialization practices
  5. Monitor for any unusual process execution or system changes
  6. Consider blocking the source IP if attack patterns persist
  7. Examine target application for signs of compromise
  8. Review recent deployments or configuration changes
  9. Check for additional indicators of compromise on affected systems
  10. Document the attack pattern for threat intelligence purposes
where: |
  (contains("raw", "java.lang.Runtime") ||
   contains("raw", "java.lang.ProcessBuilder") ||
   contains("raw", "$$beanFactory") ||
   (contains("raw", "org.apache.commons.collections") && contains("raw", "Transformer")) ||
   (contains("raw", "java.io.ObjectInputStream") && contains("raw", "exec")) ||
   contains("raw", "com.sun.rowset.JdbcRowSetImpl") ||
   contains("raw", "ysoserial") ||
   contains("raw", "java.net.URLClassLoader"))
afterEvents:
  - indexPattern: v11-log-json-input-*
    with:
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 10m
    count: 3
groupBy:
  - adversary.ip
  - target.host
