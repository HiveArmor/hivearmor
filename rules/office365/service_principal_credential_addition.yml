# Rule version v1.0.0

dataTypes:
  - o365
name: Service Principal Credential Addition
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Persistence
technique: "T1098.001 - Account Manipulation: Additional Cloud Credentials"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/active-directory/develop/howto-create-service-principal-portal
  - https://attack.mitre.org/techniques/T1098/001/
description: |
  Detects addition of credentials (secrets or certificates) to application registrations and service principals. Attackers may add new credentials to existing service principals to establish persistent backdoor access to the tenant without relying on user credentials.

  Next Steps:
  1. Identify the application or service principal receiving the new credential
  2. Verify the credential addition was authorized by the application owner
  3. Review the application's API permissions and scope of access
  4. Check the credential type (secret, certificate) and its expiration
  5. Review the identity adding the credential for signs of compromise
  6. If unauthorized, remove the added credential and rotate existing ones
  7. Review Azure AD audit logs for actions performed using the new credential
  8. Implement Azure AD alerts for credential changes to critical applications
where: |
  oneOf("action", ["Add service principal credentials.", "Update application - Certificates and secrets management"]) &&
  equals("actionResult", "Success")
groupBy:
  - lastEvent.log.Parameters
  - adversary.user
