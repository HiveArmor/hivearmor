# Rule version v1.0.0

dataTypes:
  - o365
name: Office 365 Anti-Phishing Policy Bypass Detected
impact:
  confidentiality: 3
  integrity: 3
  availability: 1
category: Defense Evasion
technique: "T1562.001 - Impair Defenses: Disable or Modify Tools"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/defender-office-365/anti-phishing-policies-about
  - https://attack.mitre.org/techniques/T1562/001/
description: |
  Detects potential bypasses or modifications to anti-phishing policies including changes to safe sender lists, domain exclusions, or policy disabling that could allow phishing emails to reach users. This rule identifies successful administrative actions on anti-phishing configurations that could weaken email security defenses.
  
  Next Steps:
  1. Review the specific anti-phishing policy changes made by the user
  2. Verify if the changes were authorized and documented in change management
  3. Check if the user has legitimate administrative privileges for email security policies
  4. Examine the timing and context of the changes (e.g., during business hours vs. off-hours)
  5. Look for any subsequent phishing emails that may have bypassed detection
  6. Consider rolling back unauthorized changes and implementing additional approval workflows
  7. Monitor for any unusual email activity following the policy modifications
where: |
  oneOf("log.Operation", ["Set-AntiPhishPolicy", "Remove-AntiPhishPolicy", "New-AntiPhishPolicy", "Disable-AntiPhishRule"]) &&
  equals("log.ResultStatus", "Success")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: log.Operation
        operator: filter_match
        value: 'AntiPhish'
    within: 4h
    count: 2
groupBy:
  - lastEvent.log.Operation
  - adversary.user
