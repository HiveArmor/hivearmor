# Rule version v1.0.0

dataTypes:
  - o365
name: Suspicious Teams Message Export Activity
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Data Exfiltration
technique: "T1114 - Email Collection"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/purview/audit-teams-audit-log-events
  - https://attack.mitre.org/techniques/T1114/
description: |
  Detects when Teams messages are exported or accessed in bulk through API calls, which could indicate an attempt to exfiltrate chat history and shared files from Microsoft Teams.
  
  Next Steps:
  1. Review the user's recent Teams activity and authentication events
  2. Check if the export activity was authorized or part of legitimate business operations
  3. Examine the volume and scope of data accessed or exported
  4. Verify the user's current permissions and access levels
  5. Look for any concurrent suspicious activities from the same user account
  6. Contact the user to confirm if they initiated these export operations
  7. Review any third-party applications that may have access to Teams data
where: |
  oneOf("action", ["MessagesListed", "MessagesExported", "RecordingExported", "TranscriptsExported"]) && exists("origin.user") && equals("log.Workload", "MicrosoftTeams")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: log.Workload
        operator: filter_term
        value: 'MicrosoftTeams'
    within: 1h
    count: 20
groupBy:
  - lastEvent.log.appAccessContextClientAppId
  - adversary.user
