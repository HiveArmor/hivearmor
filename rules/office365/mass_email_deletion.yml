# Rule version v1.0.0

dataTypes:
  - o365
name: Mass Email Deletion Detected
impact:
  confidentiality: 2
  integrity: 3
  availability: 2
category: Data Loss
technique: "T1114 - Email Collection"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/purview/audit-mailboxes
  - https://attack.mitre.org/techniques/T1114/
description: |
  Detects when a user performs mass deletion of emails which could indicate data destruction, covering tracks, or malicious insider activity. Monitors for multiple HardDelete or SoftDelete operations within a short time window.
  
  Next Steps:
  1. Verify the legitimacy of the user performing the deletions
  2. Check if this aligns with any scheduled maintenance or cleanup activities
  3. Investigate the content and importance of deleted emails if possible
  4. Review user's recent access patterns and behavior
  5. Check for any concurrent suspicious activities from the same user
  6. Validate if the user has appropriate permissions for bulk email operations
  7. Consider temporarily restricting the user's access pending investigation
where: |
  oneOf("action", ["HardDelete", "SoftDelete"]) && exists("origin.user") && exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: action
        operator: filter_term
        value: 'HardDelete'
    within: 15m
    count: 100
    or:
      - indexPattern: v11-log-o365-*
        with:
          - field: origin.user
            operator: filter_term
            value: '{{.origin.user}}'
          - field: action
            operator: filter_term
            value: 'SoftDelete'
        within: 15m
        count: 100
groupBy:
  - adversary.user
