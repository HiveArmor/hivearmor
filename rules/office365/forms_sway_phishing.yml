# Rule version v1.0.0

dataTypes:
  - o365
name: Office 365 Forms and Sway Phishing Detection
impact:
  confidentiality: 2
  integrity: 2
  availability: 1
category: Initial Access
technique: "T1566 - Phishing"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/anti-phishing-policies-about
  - https://attack.mitre.org/techniques/T1566/
description: |
  Detects suspicious usage of Microsoft Forms and Sway for phishing page creation. Attackers leverage these legitimate Microsoft services to host phishing pages that bypass email security controls and appear trustworthy to victims due to the microsoft.com domain.

  Next Steps:
  1. Review the Form or Sway content for phishing indicators (credential harvesting, fake login pages)
  2. Check the creator account for signs of compromise
  3. Review the Form's collection settings for password or sensitive data collection
  4. Check if the Form or Sway was shared externally
  5. Review response submissions for harvested credentials
  6. If malicious, delete the Form/Sway and reset the creator's credentials
  7. Implement DLP policies to detect credential harvesting forms
  8. Enable Microsoft Defender for Office 365 Forms protection
where: |
  (oneOf("action", ["FormCreated", "FormUpdated", "FormShared"]) ||
   contains("action", "Sway")) &&
  equals("actionResult", "Success") &&
  (contains("log.Parameters", "password") ||
   contains("log.Parameters", "credential") ||
   contains("log.Parameters", "login") ||
   contains("log.Parameters", "external"))
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: action
        operator: filter_match
        value: 'Form'
    within: 1h
    count: 3
groupBy:
  - adversary.user
