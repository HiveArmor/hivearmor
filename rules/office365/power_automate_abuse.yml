# Rule version v1.0.0

dataTypes:
  - o365
name: Suspicious Power Automate Flow Activity
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Process Automation Abuse
technique: Automated Collection
adversary: origin
references:
  - https://docs.microsoft.com/en-us/power-platform/admin/audit-data-user-activity
  - https://attack.mitre.org/techniques/T1119/
description: |
  Detects creation or modification of Power Automate flows that could be used for automated data exfiltration or unauthorized process automation. This rule identifies suspicious Power Automate activity including flow creation, modification, sharing, and connection management that may indicate malicious automation attempts.
  
  Next Steps:
  1. Investigate the user account performing the Power Automate actions - verify if this is legitimate business activity
  2. Review the specific flows created or modified - analyze their triggers, actions, and data access patterns
  3. Check if the flows are accessing sensitive data sources (SharePoint, OneDrive, databases, external APIs)
  4. Examine flow sharing patterns - verify if flows are being shared with unauthorized users or external accounts
  5. Review connection creation/deletion activities - check for connections to suspicious external services
  6. Correlate with other Office 365 audit logs to identify broader attack patterns
  7. If malicious, immediately disable the flows and revoke user permissions
  8. Consider implementing Power Platform DLP policies to prevent future abuse
where: |
  oneOf("action", ["CreateFlow", "ShareFlow", "CreateConnection"]) &&
  equals("actionResult", "Success") &&
  equals("log.Workload", "PowerAutomate")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: log.Workload
        operator: filter_term
        value: 'PowerAutomate'
    within: 6h
    count: 10
groupBy:
  - lastEvent.action
  - adversary.user
