# Rule version v1.0.0

dataTypes:
  - o365
name: Information Barriers Policy Violation
impact:
  confidentiality: 3
  integrity: 2
  availability: 1
category: Privilege Escalation
technique: Valid Accounts
adversary: origin
references:
  - https://learn.microsoft.com/en-us/purview/information-barriers
  - https://attack.mitre.org/techniques/T1078/
description: |
  Detects violations of information barrier policies designed to prevent conflicts of interest by restricting communications and collaborations between specific groups or individuals within the organization. Information barriers are critical security controls that prevent unauthorized information sharing between different business units or roles.
  
  Next Steps:
  1. Review the specific information barrier policy that was violated and the users involved
  2. Investigate whether the violation was intentional or accidental
  3. Check if there are patterns of repeated violations by the same user or group
  4. Review and update information barrier policies if necessary
  5. Provide additional training to users if violations appear to be due to lack of awareness
  6. Consider implementing additional technical controls to prevent future violations
where: |
  equals("action", "InformationBarrierPolicyViolation") || (equals("log.PolicyType", "InformationBarrier") && equals("actionResult", "Blocked")) || (equals("log.ViolationType", "InformationBarrier") && equals("action", "CommunicationBlocked"))
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: log.PolicyType
        operator: filter_term
        value: 'InformationBarrier'
    within: 12h
    count: 3
groupBy:
  - lastEvent.log.TargetUser
  - adversary.user
