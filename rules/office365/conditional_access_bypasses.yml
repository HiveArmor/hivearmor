# Rule version v1.0.0

dataTypes:
  - o365
name: Conditional Access Bypass Detection
impact:
  confidentiality: 2
  integrity: 2
  availability: 1
category: Defense Evasion
technique: "T1550 - Use Alternate Authentication Material"
adversary: origin
references:
  - https://learn.microsoft.com/en-us/azure/active-directory/conditional-access/overview
  - https://attack.mitre.org/techniques/T1550/
description: |
  Detects attempts to bypass conditional access policies through various methods including legacy authentication, trusted location manipulation, or session token abuse. This rule identifies when users successfully authenticate despite conditional access policy failures or use legacy authentication methods that may bypass modern security controls.
  
  Next Steps:
  1. Verify the legitimacy of the authentication attempt with the user
  2. Review conditional access policy configuration and compliance
  3. Check if the authentication method used is approved for the user's role
  4. Investigate the source IP address and device details
  5. Review recent policy changes that might have caused legitimate bypass
  6. Consider implementing stricter conditional access policies for high-risk users
  7. Monitor for additional suspicious activities from the same user or IP
where: |
  (oneOf("action", ["UserLoggedIn", "UserLoginFailed"]) &&
   (oneOf("log.ConditionalAccessStatus", ["failure", "notApplied"]) && equals("actionResult", "Succeeded"))) &&
  exists("origin.user") &&
  exists("origin.ip")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: origin.ip
        operator: filter_term
        value: '{{.origin.ip}}'
    within: 30m
    count: 5
groupBy:
  - adversary.ip
  - adversary.user
