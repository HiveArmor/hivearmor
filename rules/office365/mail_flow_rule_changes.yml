# Rule version v1.0.0

dataTypes:
  - o365
name: Office 365 Mail Flow Rule Modified
impact:
  confidentiality: 3
  integrity: 3
  availability: 2
category: Defense Evasion
technique: "T1564.008 - Hide Artifacts: Email Hiding Rules"
adversary: origin
references:
  - https://admindroid.com/how-to-audit-transport-rule-changes-report-in-microsoft-365
  - https://attack.mitre.org/techniques/T1564/008/
description: |
  Detects modifications to mail flow rules (transport rules) in Office 365. Attackers may create or modify mail flow rules to redirect, delete, or hide emails, bypassing security controls or exfiltrating data. Mail flow rules can be used to automatically delete emails containing specific keywords, forward sensitive emails to external addresses, or modify email content.
  
  Next Steps:
  1. Review the specific mail flow rule that was modified, including its conditions and actions
  2. Verify if the change was authorized and performed by a legitimate administrator
  3. Check if the rule involves email forwarding to external domains or deletion of emails
  4. Examine recent email traffic to identify any emails that may have been affected by the rule
  5. Review mailbox audit logs for the affected user accounts
  6. Check for other administrative changes made by the same user around the same time
  7. If unauthorized, disable the malicious rule immediately and investigate the compromised account
where: |
  oneOf("action", ["New-TransportRule", "Set-TransportRule", "Remove-TransportRule", "Enable-TransportRule", "Disable-TransportRule"]) &&
  equals("actionResult", "Success")
afterEvents:
  - indexPattern: v11-log-o365-*
    with:
      - field: origin.user
        operator: filter_term
        value: '{{.origin.user}}'
      - field: action
        operator: filter_match
        value: 'TransportRule'
    within: 1h
    count: 3
groupBy:
  - lastEvent.action
  - adversary.user
